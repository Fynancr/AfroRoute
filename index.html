<style>
:root{--navy:#0A2540;--navy2:#0d3258;--green:#1ABC9C;--green2:#16a085;--gpale:rgba(26,188,156,.1);--gborder:rgba(26,188,156,.25);--bg:#f4f6f9;--bg2:#edf0f5;--surf:#fff;--surf2:#f8fafc;--bord:#e2e8f0;--bord2:#cbd5e1;--text:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;--danger:#ef4444;--dpale:rgba(239,68,68,.1);--warn:#f59e0b;--wpale:rgba(245,158,11,.1);--succ:#10b981;--spale:rgba(16,185,129,.1);--nav-h:62px;--bot-h:60px;--r:14px;--rs:9px;--rl:20px;--sh:0 2px 12px rgba(0,0,0,.07);--shm:0 4px 20px rgba(0,0,0,.1);--shl:0 8px 32px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;font-size:16px}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(.94)}60%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,188,156,.4)}70%{box-shadow:0 0 0 10px rgba(26,188,156,0)}}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%,85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(10px)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
.page{animation:fadeUp .3s ease both}
.nav{position:sticky;top:0;z-index:800;height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between;width:100%;box-sizing:border-box;padding-left:16px;padding-right:16px;padding-bottom:0;box-shadow:0 1px 12px rgba(0,0,0,.05);max-width:100vw}
.nav-logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.nav-logo-mark{width:36px;height:36px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(10,37,64,.15);padding:2px;overflow:hidden}
.nav-logo img{height:32px;width:auto;flex-shrink:0}.nav-logo-text{font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:18px;color:var(--navy)}
.nav-beta{font-size:9px;font-weight:700;color:var(--green);background:var(--gpale);border:1px solid var(--gborder);padding:2px 7px;border-radius:20px}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-link{font-size:13px;font-weight:600;color:var(--text3);background:none;border:none;padding:6px 10px;border-radius:7px;transition:all .18s;display:none}
.nav-link:hover{color:var(--navy);background:var(--bg)}
@media(min-width:768px){.nav-link{display:block}}
.btn-ng{background:none;border:1.5px solid var(--bord2);color:var(--text2);padding:7px 14px;border-radius:var(--rs);font-weight:600;font-size:13px;transition:all .18s}
.btn-ng:hover{border-color:var(--navy);color:var(--navy)}
.btn-ns{background:var(--navy);color:#fff;border:none;padding:7px 14px;border-radius:var(--rs);font-weight:600;font-size:13px;transition:all .18s}
.btn-ns:hover{background:var(--navy2)}
.lang-sel{border:1.5px solid var(--bord);border-radius:var(--rs);padding:6px 8px;font-size:12px;font-weight:600;color:var(--text2);background:#fff;cursor:pointer;outline:none}
.lang-sel:focus{border-color:var(--green)}
.nav-icn{position:relative;background:none;border:none;padding:7px;font-size:20px;line-height:1;border-radius:9px;transition:background .18s;color:var(--text3)}
.nav-icn:hover{background:var(--bg);color:var(--text)}
.ndot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--green);border-radius:50%;border:2px solid #fff}
.uchip{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--green));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;cursor:pointer;border:2px solid transparent;transition:border-color .18s}
.uchip:hover{border-color:var(--green)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:800;height:calc(var(--bot-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--bord);display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 -2px 16px rgba(0,0,0,.07);padding-bottom:env(safe-area-inset-bottom,0px)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text4);transition:color .18s;padding:6px 4px;position:relative}
.bnav-btn.active{color:var(--green)}
.bnav-btn svg{width:22px;height:22px;stroke-width:1.8;transition:stroke .18s}
.bnav-btn.active svg{stroke-width:2.2}
.bnav-lbl{font-size:9px;font-weight:600;line-height:1}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);width:16px;height:16px;background:var(--green);border-radius:50%;font-size:9px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.content{min-height:calc(100vh - var(--nav-h) - var(--bot-h) - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));padding-bottom:calc(var(--bot-h) + env(safe-area-inset-bottom,0px) + 8px)}
.hero{background:linear-gradient(145deg,var(--navy) 0%,#0c3060 50%,#0a4a38 100%);padding:44px 20px 64px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(26,188,156,.15) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-80px;left:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(26,188,156,.08) 0%,transparent 65%);pointer-events:none}
.hero-in{position:relative;z-index:1}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(26,188,156,.16);border:1px solid rgba(26,188,156,.3);color:var(--green);font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;margin-bottom:18px;letter-spacing:.3px}
.hero h1{font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:clamp(26px,6.5vw,48px);color:#fff;line-height:1.13;margin-bottom:14px;letter-spacing:-.5px}
.hero h1 em{font-style:normal;color:var(--green)}
.hero-sub{color:rgba(255,255,255,.7);font-size:15px;line-height:1.7;margin-bottom:32px;max-width:460px}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-h1{background:var(--green);color:#fff;border:none;padding:13px 24px;border-radius:12px;font-weight:700;font-size:15px;font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:all .2s;box-shadow:0 4px 16px rgba(26,188,156,.35)}
.btn-h1:hover{background:var(--green2);transform:translateY(-1px)}
.btn-h2{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:13px 24px;border-radius:12px;font-weight:700;font-size:15px;font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:all .2s}

/* ── DESKTOP: CENTER EVERYTHING ── */
@media(min-width:768px){
  /* Hide mobile nav */
  .bottom-nav{display:none}
  .content{padding-bottom:0;min-height:calc(100vh - var(--nav-h) - env(safe-area-inset-top,0px))}
  .det-actions{bottom:0}
  .toast{bottom:20px}

  /* Nav: center content, full-width background */
  .nav{padding:0 clamp(40px, calc((100vw - 1100px) / 2), 50vw)}
  
  /* Hero */
  .hero{padding:60px 0 80px}
  .hero-in{max-width:1100px;margin:0 auto;padding:0 40px;box-sizing:border-box}
  
  /* Stats bar */
  .stats-row{max-width:600px;margin:-22px auto 0;transform:none;box-sizing:border-box}
  
  /* All sections get centered */
  .sec{max-width:1100px;margin-left:auto;margin-right:auto;padding:0 40px 32px;box-sizing:border-box}
  
  /* Page header */
  .phd{max-width:1100px;margin-left:auto;margin-right:auto;padding:32px 40px 0;box-sizing:border-box}

  /* Browse filter/sort wrappers */
  .fw{max-width:none}

  /* Forms */
  .form-card{max-width:680px;margin-left:auto;margin-right:auto}

  /* Profile sections */
  .prof-hero{max-width:560px;margin-left:auto;margin-right:auto}
  .prof-stats{max-width:560px;margin-left:auto;margin-right:auto}
  .mrow{max-width:560px;margin-left:auto;margin-right:auto;border:1px solid var(--bord)}

  /* Auth */
  .auth-wrap{max-width:420px;margin:0 auto;padding:40px 32px}

  /* Detail page body */
  .det-body{max-width:760px;margin:0 auto}

  /* Pricing */
  .sub-hero{max-width:620px;margin-left:auto;margin-right:auto}

  /* Footer centered */
  .footer{padding:40px 0 24px;background:#0A2540;width:100%;box-sizing:border-box}
  .footer-brand,.footer-grid,.footer-bot{max-width:1100px;margin-left:auto;margin-right:auto;padding-left:24px;padding-right:24px;box-sizing:border-box}

  /* Admin stats */
  .adm-sg{max-width:1100px;margin-left:auto;margin-right:auto}
}

/* ── WIDE SCREENS ── */
@media(min-width:1280px){
  .hero-in,.sec,.phd,.footer-brand,.footer-grid,.footer-bot{max-width:1200px}
  .stats-row{max-width:700px}
}

/* ── BROWSE/CONTENT PAGE INNER DIVS ── */
@media(min-width:768px){
  /* Any direct child div of .page that has inline padding gets centered */
  .page > div:not(.hero):not(.det-hero):not(.det-body):not(.msg-layout):not(.auth-wrap){
    max-width:1100px;
    margin-left:auto;
    margin-right:auto;
    padding-left:40px;
    padding-right:40px;
    box-sizing:border-box;
  }
  /* But don't re-constrain already-constrained elements */
  .page > .sec{padding-left:40px;padding-right:40px}
  .page > .phd{padding-left:40px;padding-right:40px}
  
  /* Profile inner wrapper */
  .page > div > .prof-hero,
  .page > div > .prof-stats,
  .page > div > .mrow,
  .page > div > button.mrow {
    max-width:560px;
    margin-left:auto;
    margin-right:auto;
  }

  .page > div > .sub-hero,
  .page > div > .feat-row,
  .page > div > .btn-sub,
  .page > div > .sub-note,
  .page > div > .faq-item {
    max-width:620px;
    margin-left:auto;
    margin-right:auto;
  }
}

/* ══ TOAST NOTIFICATION ═══════════════════════════════════ */
@keyframes toastSlide{
  0%{opacity:0;transform:translateX(-50%) translateY(-16px) scale(.92)}
  12%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.03)}
  18%{transform:translateX(-50%) translateY(0) scale(1)}
  75%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.96)}
}
.toast{
  position:fixed;
  top:68px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  min-width:260px;
  max-width:90vw;
  padding:14px 18px 14px 16px;
  border-radius:16px;
  font-size:14px;
  font-weight:600;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.12);
  animation:toastSlide 3.4s cubic-bezier(.34,1.56,.64,1) forwards;
  pointer-events:none;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  letter-spacing:.01em;
}
.toast::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:16px;
  opacity:.15;
  pointer-events:none;
}
.toast-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:rgba(255,255,255,.18);
}
.toast-msg{flex:1;line-height:1.35}
.toast.success{background:linear-gradient(135deg,#0A2540 0%,#0d6e5b 100%)}
.toast.success .toast-icon::after{content:'✓'}
.toast.error{background:linear-gradient(135deg,#450a0a 0%,#dc2626 100%)}
.toast.error .toast-icon::after{content:'✕'}
.toast.warning{background:linear-gradient(135deg,#431407 0%,#d97706 100%)}
.toast.warning .toast-icon::after{content:'!'}

  min-width:0;
  width:100%;
  max-width:100vw;
  box-sizing:border-box;
}
.chat-hd{padding:12px 16px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px;background:#fff;flex-shrink:0}
.chat-hn{font-weight:700;color:var(--navy);font-size:14px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.chat-ib{padding:10px 14px;background:#fff;border-top:1px solid var(--bord);display:flex;gap:8px;flex-shrink:0;align-items:flex-end;width:100%;box-sizing:border-box}
.chat-inp{flex:1;border:1.5px solid var(--bord);border-radius:22px;padding:10px 16px;font-size:14px;outline:none;transition:border-color .18s;resize:none;max-height:100px;line-height:1.5;overflow-y:auto;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-width:0}
.btn-send{background:var(--green);border:none;border-radius:22px;padding:10px 18px;color:#fff;font-weight:700;font-size:13px;transition:background .18s;white-space:nowrap;height:42px;display:flex;align-items:center;gap:6px;cursor:pointer;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;flex-shrink:0}

/* Back button in mobile chat header */
.chat-back-btn{background:none;border:none;padding:4px 8px 4px 0;cursor:pointer;font-size:20px;color:var(--navy);flex-shrink:0;line-height:1}

/* Empty state */
.msg-empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  padding:32px 24px;
  text-align:center;
  width:100%;
  box-sizing:border-box;
}

/* ── DESKTOP LAYOUT (768px+) ── */
@media(min-width:768px){
  .msg-layout{
    flex-direction:row;
    height:calc(100vh - var(--nav-h) - var(--bot-h));
  }
  /* Show desktop sidebar */
  .conv-sb{
    display:block;
    width:80px;
    border-right:1px solid var(--bord);
    background:#fff;
    overflow-y:auto;
    flex-shrink:0;
    padding:8px 4px;
  }
  /* Hide mobile card list on desktop */
  .conv-list-mobile{
    display:none;
  }
  /* Chat area normal on desktop */
  .chat-area{
    border-left:none;
  }
  .chat-back-btn{
    display:none;
  }
}</style>

e import/export laws for the route. I understand that prohibited or restricted items may be refused, confiscated, reported, or subject to legal action.",agreement_traveler_acceptance_text:"I have reviewed the item list, photos, route, weight, and declared value. I agree to carry only the documented items listed in this agreement. I may refuse any item that is not documented, appears unsafe, illegal, restricted, or different from the description.",agreement_both_party_text:"Both parties understand that AfroRoute documents the agreement and delivery confirmations for trust and dispute resolution. AfroRoute does not approve illegal, restricted, dangerous, or undeclared items.",confirm_delivery:"Confirm Delivery",mark_in_transit:"Mark In Transit",confirm_pickup:"Confirm Pickup",open_dispute:"Open Dispute",waiting_sender_confirm:"Waiting for sender confirmation",waiting_payout_review:"Waiting for payout review",payout_released_msg:"Payout has been released by AfroRoute.",faq_q6:"How do I get paid as a traveler?",faq_a6:"For your safety, keep payments and transaction details inside AfroRoute whenever the platform supports them. Off-platform deals reduce protection and support.",
faq_q7:"What happens if something gets lost or damaged?",faq_a7:"AfroRoute is a connection platform and is not liable for lost or damaged items. We strongly recommend that both parties document the shipment with photos before handoff and agree on terms in writing via the messaging system.",
faq_q8:"Is AfroRoute legal?",faq_a8:"Yes. Using a traveler's spare luggage is legal in most countries. However, both parties are responsible for complying with local customs laws, declaring items correctly, and not shipping prohibited goods. Always check the customs rules for your specific route.",

    return;
  }
  setOtpError('');
  try {

      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ email, create_user: false })
    });
    if (r.ok) {
      setOtpSent(true);

async function startStripeCheckout(userEmail,userId,plan='premium'){
  const r=await fetch('/api/create-checkout-session',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:userEmail,userId,plan})
  });
  const data=await r.json();
  if(!r.ok) throw new Error(data.error||'Checkout failed ('+r.status+')');
  if(!data.url) throw new Error('No checkout URL returned from server');
  window.location.href=data.url;
}


// ── Agreement ID generator ────────────────────────────────────────────────────
function generateAgreementId(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return 'AGR-'+code;
}

    context.scale(dpr,dpr);
    context.strokeStyle='#0A2540';
    context.lineWidth=2.5;
    context.lineCap='round';
    context.lineJoin='round';
    ctx.current=context;
  },[canvasRef]);

  React.useEffect(()=>{
    const c=canvasRef.current;
    if(!c)return;

    // Init after a short delay to ensure layout
    const t=setTimeout(setup,80);

    const getPos=(e)=>{
      const rect=c.getBoundingClientRect();
      const src=e.touches?e.touches[0]:e;
      return{x:src.clientX-rect.left,y:src.clientY-rect.top};
    };
    const start=(e)=>{
      e.preventDefault();
      e.stopPropagation();
      if(!ctx.current)setup();
      drawing.current=true;
      const p=getPos(e);
      lastPos.current=p;
      ctx.current.beginPath();
      ctx.current.moveTo(p.x,p.y);
    };
    const move=(e)=>{
      e.preventDefault();
      e.stopPropagation();
      if(!drawing.current||!ctx.current)return;
      const p=getPos(e);
      ctx.current.lineTo(p.x,p.y);
      ctx.current.stroke();
      ctx.current.beginPath();
      ctx.current.moveTo(p.x,p.y);
      lastPos.current=p;
      setHasSig(true);
    };
    const end=(e)=>{
      e.preventDefault();
      drawing.current=false;
      if(ctx.current){ctx.current.beginPath();}
    };

    c.addEventListener('mousedown',start,{passive:false});
    c.addEventListener('mousemove',move,{passive:false});
    c.addEventListener('mouseup',end,{passive:false});
    c.addEventListener('touchstart',start,{passive:false});
    c.addEventListener('touchmove',move,{passive:false});
    c.addEventListener('touchend',end,{passive:false});
    c.addEventListener('touchcancel',end,{passive:false});

    // Re-setup on resize
    const ro=window.ResizeObserver?new ResizeObserver(()=>{if(!hasSig)setup();}):null;
    if(ro)ro.observe(c);

    return()=>{
      clearTimeout(t);
      c.removeEventListener('mousedown',start);
      c.removeEventListener('mousemove',move);
      c.removeEventListener('mouseup',end);
      c.removeEventListener('touchstart',start);
      c.removeEventListener('touchmove',move);
      c.removeEventListener('touchend',end);
      c.removeEventListener('touchcancel',end);
      if(ro)ro.disconnect();
    };
  },[canvasRef,setup]);

  const clear=React.useCallback(()=>{
    const c=canvasRef.current;
    if(!c||!ctx.current)return;
    ctx.current.clearRect(0,0,c.width,c.height);
    setHasSig(false);
  },[canvasRef]);

  const getDataUrl=React.useCallback(()=>{
    const c=canvasRef.current;
    return c?c.toDataURL('image/png'):null;
  },[canvasRef]);

  return{hasSig,clear,getDataUrl,setup};
}

// ── Fetch reviews for a user ──────────────────────────────
async function fetchUserReviews(userId){
  try{
    const url=`${SUPABASE_URL}/rest/v1/reviews?reviewee_id=eq.${userId}&select=id,rating,comment,created_at,reviewer_id,profiles!reviewer_id(name,avatar_url)&order=created_at.desc`;
    const r=await fetch(url,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}});
    if(!r.ok)return[];
    return r.json();
  }catch(e){return[];}
}

// SHIPMENT STATUS TIMELINE
// ═══════════════════════════════════════════════════════════════
const SHIPMENT_STATUSES = [
  'draft','agreement_pending','agreement_signed','picked_up',
  'in_transit','traveler_delivered','sender_confirmed',
  'delivery_confirmed','payout_ready','payout_released'
];
const DISPUTE_STATUSES = ['disputed','cancelled'];

function ShipmentStatusTimeline({status, t, userRole}) {
  const stages = [
    {key:'agreement', label:t.agreement_title||'Agreement', statuses:['agreement_pending','agreement_signed']},
    {key:'pickup',    label:t.shipment_status_picked_up||'Pickup',      statuses:['picked_up']},
    {key:'transit',   label:t.shipment_status_in_transit||'In transit', statuses:['in_transit']},
    {key:'delivery',  label:t.delivery_confirm_title||'Delivery',       statuses:['traveler_delivered','sender_confirmed','delivery_confirmed']},
    {key:'payout',    label:t.shipment_status_payout_ready||'Payout',   statuses:['payout_ready','payout_released']},
  ];
  const statusIdx = SHIPMENT_STATUSES.indexOf(status);
  const isException = DISPUTE_STATUSES.includes(status);

  return React.createElement('div',{style:{padding:'16px 0',overflowX:'auto'}},
    isException&&React.createElement('div',{style:{background:status==='disputed'?'rgba(239,68,68,.1)':'rgba(100,116,139,.1)',border:`1px solid ${status==='disputed'?'rgba(239,68,68,.3)':'rgba(100,116,139,.3)'}`,borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,fontWeight:700,color:status==='disputed'?'#b91c1c':'#475569',display:'flex',gap:8,alignItems:'center'}},
      React.createElement('span',null,status==='disputed'?'⚠':'✖'),
      React.createElement('span',null,status==='disputed'?(t.shipment_status_disputed||'Disputed'):(t.shipment_status_cancelled||'Cancelled'))
    ),
    React.createElement('div',{style:{display:'flex',alignItems:'flex-start',gap:0}},
      stages.map((stage,i)=>{
        const stageMax = Math.max(...stage.statuses.map(s=>SHIPMENT_STATUSES.indexOf(s)));
        const stageDone = statusIdx > stageMax;
        const stageActive = stage.statuses.includes(status);
        const stageFuture = !stageDone && !stageActive;
        const color = stageDone?'var(--succ)':stageActive?'var(--navy)':'#cbd5e1';
        return React.createElement('div',{key:stage.key,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',position:'relative'}},
          i>0&&React.createElement('div',{style:{position:'absolute',top:11,right:'50%',left:'-50%',height:2,background:stageDone?'var(--succ)':'#e2e8f0',zIndex:0}}),
          React.createElement('div',{style:{width:24,height:24,borderRadius:'50%',background:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,position:'relative',zIndex:1}},
            stageDone?'✓':stageActive?'●':React.createElement('span',{style:{fontSize:8}},'○')
          ),
          React.createElement('div',{style:{fontSize:10,fontWeight:stageActive?700:500,color:stageFuture?'#94a3b8':'var(--navy)',marginTop:4,textAlign:'center',lineHeight:1.3}},stage.label)
        );
      })
    ),
    React.createElement('div',{style:{marginTop:12,background:'rgba(10,37,64,.04)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--navy)',fontWeight:600,textAlign:'center'}},
      t['shipment_status_'+status] || status
    )
  );
}

function DeliveryConfirmationPage({user, agreement, shipment, t, sb, showToast, onStatusChange, onCancel}) {
  // NOTE: Final legal declaration language must be reviewed by counsel before public launch.
  const[travelerPhoto,setTravelerPhoto] = React.useState('');
  const[recipientCode,setRecipientCode] = React.useState('');
  const[travelerNotes,setTravelerNotes] = React.useState('');
  const[senderNotes,setSenderNotes]     = React.useState('');
  const[disputeReason,setDisputeReason] = React.useState('');
  const[showDispute,setShowDispute]     = React.useState(false);
  const[saving,setSaving]               = React.useState(false);
  const[confirmed,setConfirmed]         = React.useState(false);
  const[tConfirmed,setTConfirmed]       = React.useState(false);
  const[sConfirmed,setSConfirmed]       = React.useState(false);

  const agrId = agreement&&agreement.id;
  const shipId = shipment&&shipment.id;
  const isTraveler = user&&agreement&&user.id === agreement.traveler_id;
  const isSender   = user&&agreement&&user.id === agreement.sender_id;

  React.useEffect(()=>{
    if(!agrId)return;
    // Load existing confirmation state
    const token = localStorage.getItem('ar_tok')||'';
    fetch(SUPABASE_URL+'/rest/v1/delivery_confirmations?agreement_id=eq.'+agrId+'&select=*',{
      headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token}
    }).then(r=>r.ok?r.json():[]).then(rows=>{
      if(rows&&rows[0]){
        const r = rows[0];
        setTConfirmed(r.traveler_confirmed||false);
        setSConfirmed(r.sender_confirmed||false);
        if(r.traveler_confirmed&&r.sender_confirmed)setConfirmed(true);
      }
    }).catch(()=>{});
  },[agrId]);

  const handleTravelerConfirm = async()=>{
    if(!isTraveler){showToast('Only the traveler can confirm delivery','error');return;}
    setSaving(true);
    try{
      const token = localStorage.getItem('ar_tok')||'';
      const now = new Date().toISOString();
      const body = {
        shipment_id: shipId, agreement_id: agrId,
        sender_id: agreement.sender_id, traveler_id: agreement.traveler_id,
        traveler_confirmed: true, traveler_confirmed_at: now,
        traveler_delivery_notes: travelerNotes||null,
        recipient_confirmation_code_hash: recipientCode||null,
      };
      await fetch(SUPABASE_URL+'/rest/v1/delivery_confirmations',{
        method:'POST',
        headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,
          Authorization:'Bearer '+token,'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify(body)
      });
      setTConfirmed(true);
      if(shipId)await updateShipmentStatus(shipId,'traveler_delivered',token);
      showToast(t.delivery_traveler_confirm_button||'Delivery confirmed');
      if(onStatusChange)onStatusChange('traveler_delivered');
    }catch(e){showToast('Error: '+e.message,'error');}
    setSaving(false);
  };

  const handleSenderConfirm = async()=>{
    if(!isSender){showToast('Only the sender can confirm delivery','error');return;}
    setSaving(true);
    try{
      const token = localStorage.getItem('ar_tok')||'';
      const now = new Date().toISOString();
      await fetch(SUPABASE_URL+'/rest/v1/delivery_confirmations?agreement_id=eq.'+agrId,{
        method:'PATCH',
        headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,
          Authorization:'Bearer '+token,'Prefer':'return=minimal'},
        body:JSON.stringify({sender_confirmed:true,sender_confirmed_at:now,sender_delivery_notes:senderNotes||null})
      });
      setSConfirmed(true);
      const newStatus = 'delivery_confirmed';
      if(shipId)await updateShipmentStatus(shipId,newStatus,token);
      // Mark payout_ready after both confirmed
      await markPayoutReady(agrId, shipId, token);
      setConfirmed(true);
      showToast(t.delivery_status_delivery_confirmed||'Delivery confirmed by both parties');
      if(onStatusChange)onStatusChange('payout_ready');
    }catch(e){showToast('Error: '+e.message,'error');}
    setSaving(false);
  };

  const updateShipmentStatus = async(sid, newStatus, token)=>{
    await fetch(SUPABASE_URL+'/rest/v1/shipments?id=eq.'+sid,{
      method:'PATCH',
      headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,
        Authorization:'Bearer '+token,'Prefer':'return=minimal'},
      body:JSON.stringify({shipment_status:newStatus,updated_at:new Date().toISOString()})
    }).catch(()=>{});
  };

  const markPayoutReady = async(agrId, shipId, token)=>{
    await fetch(SUPABASE_URL+'/rest/v1/delivery_confirmations?agreement_id=eq.'+agrId,{
      method:'PATCH',
      headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,
        Authorization:'Bearer '+token,'Prefer':'return=minimal'},
      body:JSON.stringify({payout_ready:true,payout_ready_at:new Date().toISOString()})
    }).catch(()=>{});
    if(shipId)await updateShipmentStatus(shipId,'payout_ready',token);
    // Notify admin via API
    fetch('/api/notify-payout-ready',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({agreement_id:agrId,shipment_id:shipId,agreement})
    }).catch(()=>{});
  };

  const handleDispute = async()=>{
    if(!disputeReason.trim()){showToast('Please describe the dispute','error');return;}
    setSaving(true);
    try{
      const token = localStorage.getItem('ar_tok')||'';
      await fetch(SUPABASE_URL+'/rest/v1/delivery_confirmations?agreement_id=eq.'+agrId,{
        method:'PATCH',
        headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,
          Authorization:'Bearer '+token,'Prefer':'return=minimal'},
        body:JSON.stringify({dispute_opened:true,dispute_reason:disputeReason})
      });
      if(shipId)await updateShipmentStatus(shipId,'disputed',token);
      showToast(t.dispute_open_button||'Dispute opened');
      if(onStatusChange)onStatusChange('disputed');
    }catch(e){showToast('Error: '+e.message,'error');}
    setSaving(false);
  };

  if(confirmed)return React.createElement('div',{style:{textAlign:'center',padding:'32px 16px'}},
    React.createElement('div',{style:{fontSize:52,marginBottom:12}},'✅'),
    React.createElement('div',{style:{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:'var(--navy)',marginBottom:8}},
      t.delivery_status_delivery_confirmed||'Delivery confirmed'),
    React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:16,lineHeight:1.6}},
      t.payout_ready_message||'Both parties confirmed delivery. Ready for payout review.'),
    React.createElement('div',{style:{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.25)',borderRadius:10,padding:'12px 14px',fontSize:12,color:'#92400e',fontWeight:600}},
      t.admin_review_required_message||'Under review by AfroRoute admin.')
  );

  return React.createElement('div',{style:{padding:'0 16px 32px'}},
    React.createElement('div',{style:{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:'var(--navy)',marginBottom:16}},
      t.delivery_confirm_title||'Delivery Confirmation'),

    // Status indicators
    React.createElement('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,background:tConfirmed?'rgba(26,188,156,.1)':'rgba(100,116,139,.1)',borderRadius:8,padding:'6px 10px',fontSize:12,fontWeight:700,color:tConfirmed?'var(--succ)':'#64748b'}},
        React.createElement('span',null,tConfirmed?'✅':'⏳'),
        React.createElement('span',null,t.delivery_status_traveler_delivered||'Traveler confirmed')
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,background:sConfirmed?'rgba(26,188,156,.1)':'rgba(100,116,139,.1)',borderRadius:8,padding:'6px 10px',fontSize:12,fontWeight:700,color:sConfirmed?'var(--succ)':'#64748b'}},
        React.createElement('span',null,sConfirmed?'✅':'⏳'),
        React.createElement('span',null,t.delivery_status_sender_confirmed||'Sender confirmed')
      )

    // Traveler confirmation section
    isTraveler&&!tConfirmed&&React.createElement('div',{style:{background:'#fff',border:'1px solid var(--bord)',borderRadius:12,padding:16,marginBottom:12}},
      React.createElement('div',{style:{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:10}},
        t.delivery_traveler_confirm_button||'Confirm Delivery'),
      React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:10,lineHeight:1.5,background:'rgba(10,37,64,.04)',borderRadius:8,padding:'8px 10px'}},
        t.delivery_traveler_declaration||'I confirm that I delivered the documented package.'),
      React.createElement('div',{style:{marginBottom:8}},
        React.createElement('label',{style:{fontSize:12,fontWeight:600,color:'var(--text2)',display:'block',marginBottom:4}},t.recipient_code_label||'Recipient Confirmation Code'),
        React.createElement('input',{className:'fi',placeholder:'e.g. 1234',value:recipientCode,onChange:e=>setRecipientCode(e.target.value)})

const getDeviceId=()=>{
  const ua=navigator.userAgent||'';
  const lang=navigator.language||'';
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  const raw=ua+lang+tz+screen.width+'x'+screen.height;
  // Simple hash
  let h=0;for(let i=0;i<raw.length;i++){h=((h<<5)-h+raw.charCodeAt(i))|0;}
  return 'dev_'+Math.abs(h).toString(36);
};

const isTrustedDevice=(userId)=>{
  try{
    const key='ar_td_'+userId;
    const stored=localStorage.getItem(key);
    if(!stored)return false;
    const {deviceId,expires}=JSON.parse(stored);
    if(Date.now()>expires)return false;
    return deviceId===getDeviceId();
  }catch(e){return false;}
};

const trustDevice=(userId)=>{
  try{

const handleSaveProfile=async(updated)=>{
  try{
    await sb.upsertProfile({id:user.id,name:updated.name,country:updated.country,whatsapp:updated.wa});
    // Save payout method to dedicated table if provided
    if(updated.payout_method){
      try{
        await sb.client
          .from('user_payout_methods')
          .upsert({
            user_id:user.id,
            payout_method:updated.payout_method,
            payout_details:updated.payout_fields||{},
            is_default:true,
            updated_at:new Date().toISOString(),
          },{onConflict:'user_id'});
      }catch(pe){console.error('Payout save non-fatal:',pe.message);}
    }
    setUser(prev=>({...prev,...updated}));showToast(t.toast_profile_saved);
  }catch(e){console.error('Profile save error:',e);showToast('Failed to save: '+e.message,'error');}
};

const handlePostTrip=async(form)=>{
  try{
    // Server-side limit check via Supabase RPC
    const {data:canPost,error:rpcErr}=await sb.client.rpc('can_create_trip',{p_user_id:user.id});
    if(rpcErr){console.error('RPC error:',rpcErr.message);}
    if(canPost===false){goUpgrade('free_limit_reached');return;}
    await sb.insert('trips',{user_id:user.id,from_country:form.from,from_city:form.fc,to_country:form.to,to_city:form.tc,travel_date:form.date,airline:form.airline,kg_available:parseFloat(form.kg),price_per_kg:form.open?null:parseFloat(form.price),open_to_offers:form.open,categories:form.cats,notes:form.notes,status:form.status});
    showToast(t.toast_trip_posted);loadListings();go('profile');
  }catch(e){
    if(e.message&&e.message.includes('FREE_TRIP_LIMIT_REACHED')){goUpgrade('free_limit_reached');return;}
    else{showToast('Failed: '+e.message,'error');}
  }
};

const loadMsgs=async(convoId)=>{
  try{
    const rows=await sb.select('messages','id,sender_id,content,created_at','conversation_id=eq.'+convoId+'&order=created_at.asc');
    if(!rows||!rows.length)return;
    const mapped=rows.map(r=>({
      id:r.id,
      from:r.sender_id===user.id?'me':'them',
      text:r.content||'',
      t:new Date(r.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
      created_at:r.created_at,
    }));
    setConvo(p=>p?{...p,msgs:mapped}:p);
    setConvos(p=>p.map(c=>c.id===convoId?{...c,msgs:mapped,last:mapped[mapped.length-1]?.text||'',lastTime:mapped[mapped.length-1]?.t||''}:c));
  }catch(e){console.log('loadMsgs non-fatal:',e.message);}
};

const openChat=(item,type)=>{
  const ex=convos.find(c=>c.other_user_id===item.user_id);
  if(ex){setConvo(ex);loadMsgs(ex.id);}else{
    (async()=>{
      try{
        const[nc]=await sb.insert('conversations',{user_a:user.id,user_b:item.user_id,listing_id:item.id,listing_type:type});
        const newC={id:nc.id,user:item.user,av:ini(item.user),listing:`${item.from} → ${item.to}`,unread:0,last:'',lastTime:'now',msgs:[],other_user_id:item.user_id};
        setConvos(p=>[newC,...p]);setConvo(newC);
      }catch(e){
        const newC={id:Date.now(),user:item.user,av:ini(item.user),listing:`${item.from} → ${item.to}`,unread:0,last:'',lastTime:'now',msgs:[],other_user_id:item.user_id};
        setConvos(p=>[newC,...p]);setConvo(newC);
      }
    })();
  }

const sendMsg=()=>{
  if(!chatIn.trim()||!activeConvo)return;
  const blockRe=/(\b\d{6,}\b)|(@)|https?:\/\/|www\.|whatsapp|telegram|instagram|call me|text me|outside app|fora da plataforma|meu numero|my number/i;
  if(blockRe.test(chatIn)){ showToast(lang==='pt'?'Para sua segurança, mantenha a comunicação dentro da AfroRoute até confirmação.':'For your safety, keep communication inside AfroRoute until confirmed.','warning'); return; }
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const nm={from:'me',text:chatIn,t:now};
  setConvos(p=>p.map(c=>c.id===activeConvo.id?{...c,msgs:[...c.msgs,nm],last:chatIn,lastTime:'now'}:c));
  setConvo(p=>({...p,msgs:[...p.msgs,nm]}));
  if(user)sb.insert('messages',{conversation_id:activeConvo.id,sender_id:user.id,content:chatIn}).catch(()=>{});
  setChatIn('');

};

const handleSubscribe=async(plan='premium')=>{
  if(!loggedIn){setPendingRedirect('pricing');go('auth');return;}
  try{
    await startStripeCheckout(user.email,user.id,plan);
  }catch(e){
    console.error('Stripe error:',e.message);
    showToast('Payment error: '+(e.message||'Unknown error'),'error');
  }
};

      ['Comunicar um Problema de Segurança',['Se descobrir uma vulnerabilidade de segurança, contacte-nos imediatamente: support@afroroute.com']]
    ]}

    terms:{title:'Terms of Service',sub:'Last updated: 15 April 2025 · Effective immediately',intro:'By creating an account or using AfroRoute, you agree to these Terms of Service. If you do not agree, do not use the platform.',sections:[
      ['1. Nature of the platform',['AfroRoute is a digital platform that connects senders and travelers. It is not a carrier, courier, logistics company, or direct party to the physical transportation of items.']],
      ['2. Eligibility',['By using AfroRoute, you represent that you have legal capacity to enter into agreements, provide truthful information, and use the platform responsibly.']],
      ['3. User responsibility',['Each user is responsible for the information they publish, the items they send or agree to carry, the decisions they make, and compliance with what they agree to with another user.']],
      ['4. Truthful information',['Users must provide complete, accurate, and non-misleading information about trips, items, quantities, weight, estimated value, and other relevant details. False or incomplete information may lead to content removal, account restriction, suspension, or termination.']],
      ['5. Off-platform communication and payments',['Users agree to keep transaction-related communication inside AfroRoute until confirmation. Users may not exchange phone numbers, emails, WhatsApp details, social media handles, external links, or other direct contact methods for the purpose of bypassing AfroRoute before confirmation. Users may not request, offer, or accept off-platform payments for transactions initiated through the platform.']],
      ['6. Loss of protection for off-platform transactions',['If users choose to communicate, agree on material terms, or make payments outside AfroRoute, AfroRoute may limit or deny dispute support, payment verification, agreement-history review, and other platform protections.']],
      ['7. Documented agreements',['Where applicable, AfroRoute may request or store item lists, photos, notes, signatures, approvals, timestamps, statuses, and agreement identifiers. These records may be used for safety, support, fraud prevention, and dispute review.']],
      ['8. Subscriptions and payments',['AfroRoute may offer paid plans, including Premium and Business. By subscribing, the user agrees to the displayed fees, applicable renewal terms, cancellation rules, and the start of digital service access.']],
      ['9. Right to monitor and restrict',['AfroRoute may use automated systems and manual review to detect fraud, abuse, fee circumvention, improper contact sharing, suspicious activity, or violations of these terms. AfroRoute may issue warnings, restrict features, remove content, suspend accounts, or terminate them where reasonably necessary to protect the platform and its users.']],
      ['10. Limitation of liability',['AfroRoute aims to create a safer and more structured environment, but does not guarantee that all transactions will be completed without incidents, delays, loss, damage, non-performance, or fraud. AfroRoute does not guarantee automatic compensation or full recovery of funds.']]
    ]},
    privacy:{title:'Privacy Policy',sub:'Last updated: 15 April 2025 · GDPR Compliant',intro:'AfroRoute respects user privacy and aims to process personal data in a transparent, secure, and proportionate way for the purposes of the platform.',sections:[
      ['1. What data we collect',['We may collect account data, including name, email, login credentials, language, city, and country. We may also collect usage data, interaction history, listings, messages, agreement records, photos, signatures, reports, technical logs, and data associated with payments or subscriptions.']],
      ['2. How we use data',['We use data to operate the platform, manage accounts, connect users, support documented agreements, enable payments and subscriptions, prevent fraud, moderate suspicious activity, respond to disputes, improve the experience, and comply with legal obligations.']],
      ['3. Who we share data with',['We may share data with infrastructure, authentication, payment, support, technical analytics, and security providers, and where necessary with authorities or legal advisers. AfroRoute does not sell personal data.']],
      ['4. Retention',['Data is kept for as long as needed to operate the platform, support users, meet legal obligations, prevent fraud, and review disputes. Some records may be kept longer for security or compliance reasons.']],
      ['5. User rights',['Depending on applicable law, users may have rights to access, correct, delete, restrict, or port certain data, and withdraw consent where applicable.']],
      ['6. Security',['AfroRoute applies reasonable technical and organizational measures to protect personal data, including access control, security logging, and suspicious-activity review.']]
    ]},

    contact:{title:'Contact Us',sub:'We read every message and reply within 24 hours.',successTitle:'Message sent!',successText:'Thank you for reaching out. Our team will reply to {email} within 24 hours — usually much sooner.',sendAnother:'Send Another',backHome:'Back to Home',formTitle:'Send us a message',typeLabel:'Type of request',name:'Name',email:'Email',subject:'Subject',message:'Message',submit:'Send message',privacy:'By submitting this form you agree to our Privacy Policy. We will only use your details to respond to your enquiry.',errors:{name:'Please enter your name',email:'Please enter a valid email',subject:'Please enter a subject',message:'Please write at least 20 characters'},toast:'Message sent! We will reply within 24 hours. ✉️'},
    prohibited:{title:'Prohibited Items',sub:'Items that may not be listed, sent, or carried through AfroRoute.',sections:[
      ['Purpose',['This policy explains what may not be sent, carried, listed, or transported through AfroRoute. Users are responsible for ensuring all items comply with airline rules, airport security rules, customs requirements, and applicable laws.','If there is any doubt about whether an item is allowed — do not list it, send it, accept it, or carry it.']],
      ['Illegal Items',['Illegal drugs or controlled substances. Stolen or counterfeit goods. Smuggled goods. Undeclared commercial goods where declaration is required. Items intended to evade customs, tax, or border controls.']],
      ['Weapons & Dangerous Items',['Firearms, ammunition, and explosives. Fireworks and grenades. Weapon parts and military-grade equipment. Stun guns, tasers, and electroshock weapons.']],
      ['Dangerous Goods',['Flammable liquids, fuels, and gas canisters. Compressed gases. Corrosive, toxic, or infectious substances. Radioactive materials. Hazardous batteries not allowed under airline rules.']],
      ['Traveler Right to Refuse',['Travelers have the right and responsibility to refuse any item that is not documented, differs from the listing, appears unsafe or illegal, cannot be inspected, or creates discomfort or suspicion.','A Traveler should never carry a package they cannot reasonably inspect and understand.']],
      ['Contact',['Report prohibited items: support@afroroute.com']]
    ]},
    disputes:{title:'Dispute Resolution Policy',sub:'How AfroRoute handles disputes between Senders and Travelers.',sections:[
      ['Purpose',['This policy explains how AfroRoute handles disputes between Senders, Travelers, and other Platform users. Our dispute process is designed to support trust, safety, and fair manual review.']],
      ['Types of Disputes',['Package not delivered, damaged, or missing items. Item mismatch or undisclosed contents. Refusal at pickup or delivery. Payment or payout dispute. Suspected fraud.']],
      ['When to Open a Dispute',['Pickup issue: within 24 hours. Delivery issue: within 24 hours. Payment/payout issue: within 7 days of payout-ready status. Prohibited item or safety issue: immediately.']],
      ['Contact',['Submit a dispute: disputes@afroroute.com']]
    ]},
    refunds:{title:'Refund & Cancellation Policy',sub:'Subscription cancellations, shipment refunds, and payout holds.',sections:[
      ['Subscriptions',['Paid subscriptions are billed immediately at checkout. The Free Plan is the trial experience. Paid plans do not include a free trial unless clearly stated at checkout.']],
      ['Subscription Cancellation',['You may cancel your paid subscription through your account settings or the Stripe Customer Portal. Cancellation prevents future billing but does not automatically refund the current billing period unless required by law.']],
      ['Shipment-Related Refunds',['Refunds may be considered where the Traveler did not pick up the package, the package was not delivered, payment was made in error, or fraud is confirmed.']],
      ['Contact',['Refund and cancellation requests: billing@afroroute.com']]
    ]},
    payout:{title:'Payout Policy',sub:'How AfroRoute reviews and releases manual payouts.',sections:[
      ['Purpose',['At this stage, payouts are manually reviewed and manually released by AfroRoute admin. AfroRoute does not guarantee automated payout timing.']],
      ['Eligibility for Payout',['A payout may become eligible only when: user account is active, identity verification is completed where required, shipment agreement is fully signed, Traveler confirms delivery, Sender confirms delivery, no dispute is open, payout method is saved, and AfroRoute admin approves.']],
      ['Payout-Ready Status',["A shipment may be marked payout_ready when both parties confirm delivery and no dispute is open. Payout-ready does not mean money has been sent."]],
      ['Contact',['Payout questions: payout@afroroute.com']]
    ]},
    security:{title:'Security',sub:'How AfroRoute protects your account, data, and transactions.',sections:[
      ['Account Security',['Your account is protected by password authentication. AfroRoute may also require identity verification via Stripe Identity before you can access certain features.','If you suspect your account has been compromised, contact us immediately at support@afroroute.com.']],
      ['Data Security',['All data transmitted between your browser and AfroRoute is encrypted using HTTPS/TLS. Payments are processed by Stripe, which is PCI-DSS compliant. We do not store full card numbers.']],
      ['Report a Security Issue',['If you discover a security vulnerability, contact us immediately: support@afroroute.com']]
    ]}
  },

      ['4. Informations exactes',['Les utilisateurs doivent fournir des informations complètes, exactes et non trompeuses sur les voyages, articles, quantités, poids, valeur estimée et autres détails pertinents. Des informations fausses ou incomplètes peuvent entraîner la suppression du contenu, la restriction du compte, la suspension ou la résiliation.']],

      ['7. Accords documentés',['Le cas échéant, AfroRoute peut demander ou stocker des listes d’articles, photos, notes, signatures, validations, horodatages, statuts et identifiants d’accord. Ces enregistrements peuvent être utilisés pour la sécurité, l’assistance, la prévention de la fraude et l’examen des litiges.']],
      ['8. Abonnements et paiements',['AfroRoute peut proposer des plans payants, y compris Premium et Business. En souscrivant, l’utilisateur accepte les frais affichés, les conditions de renouvellement applicables, les règles d’annulation et le démarrage de l’accès au service numérique.']],
      ['9. Droit de surveiller et restreindre',['AfroRoute peut utiliser des systèmes automatisés et une révision manuelle pour détecter fraude, abus, contournement des frais, partage inapproprié de contacts, activité suspecte ou violation des présentes conditions. AfroRoute peut émettre des avertissements, restreindre des fonctionnalités, retirer du contenu, suspendre des comptes ou y mettre fin lorsque cela est raisonnablement nécessaire pour protéger la plateforme et ses utilisateurs.']],
      ['10. Limitation de responsabilité',['AfroRoute vise à créer un environnement plus sûr et plus structuré, mais ne garantit pas que toutes les transactions se dérouleront sans incident, retard, perte, dommage, inexécution ou fraude. AfroRoute ne garantit ni compensation automatique ni récupération intégrale des fonds.']]

    privacy:{title:'Politique de confidentialité',sub:'Dernière mise à jour : 15 Avril 2025 · Conforme RGPD',intro:'AfroRoute respecte la vie privée des utilisateurs et traite les données personnelles de manière transparente, sécurisée et proportionnée aux finalités de la plateforme.',sections:[
      ['1. Données que nous collectons',['Nous pouvons collecter des données de compte, y compris nom, email, identifiants de connexion, langue, ville et pays. Nous pouvons aussi collecter des données d’utilisation, historique d’interaction, annonces, messages, enregistrements d’accord, photos, signatures, signalements, logs techniques et données liées aux paiements ou abonnements.']],
      ['2. Comment nous utilisons les données',['Nous utilisons les données pour faire fonctionner la plateforme, gérer les comptes, connecter les utilisateurs, prendre en charge les accords documentés, permettre les paiements et abonnements, prévenir la fraude, modérer les activités suspectes, répondre aux litiges, améliorer l’expérience et respecter les obligations légales.']],
      ['3. Avec qui nous partageons les données',['Nous pouvons partager les données avec des prestataires d’infrastructure, d’authentification, de paiement, de support, d’analyse technique et de sécurité, et lorsque nécessaire avec des autorités ou des conseillers juridiques. AfroRoute ne vend pas de données personnelles.']],
      ['4. Conservation',['Les données sont conservées aussi longtemps que nécessaire pour faire fonctionner la plateforme, assister les utilisateurs, respecter les obligations légales, prévenir la fraude et examiner les litiges. Certains enregistrements peuvent être conservés plus longtemps pour des raisons de sécurité ou de conformité.']],

      ['6. Sécurité',['AfroRoute applique des mesures techniques et organisationnelles raisonnables pour protéger les données personnelles, y compris contrôle d’accès, journalisation de sécurité et examen des activités suspectes.']]

      ['Objectif',["Cette politique explique ce qui ne peut pas être envoyé, transporté ou annoncé via AfroRoute. Les utilisateurs sont responsables de s'assurer que tous les articles respectent les règles des compagnies aériennes, les règles de sécurité aéroportuaire, les exigences douanières et les lois applicables.","En cas de doute sur l'autorisation d'un article — ne le répertoriez pas, ne l'envoyez pas, ne l'acceptez pas et ne le transportez pas."]],

      ['Marchandises dangereuses',["Liquides inflammables, carburants et bonbonnes de gaz. Gaz comprimés. Substances corrosives, toxiques ou infectieuses. Matières radioactives. Batteries dangereuses non autorisées par les règles des compagnies aériennes."]],

    refunds:{title:"Politique de remboursement et d'annulation",sub:"Annulations d'abonnement, remboursements d'expédition et retenues de versement.",sections:[

      ["Annulation d'abonnement",["Vous pouvez annuler votre abonnement payant via les paramètres de votre compte ou le Portail Client Stripe. L'annulation empêche toute facturation future mais ne rembourse pas automatiquement la période en cours."]],

      ["Conditions d'éligibilité au versement",["Un versement ne peut devenir éligible que lorsque toutes les conditions requises sont remplies : compte utilisateur actif, vérification d'identité complète, accord d'expédition entièrement signé, confirmation de livraison par les deux parties, aucun litige ouvert, méthode de versement enregistrée et approbation de l'administrateur d'AfroRoute."]],

function PricingPage({go, lang, onSubscribe, onLoggedIn, onNeedLogin, upgradeReason, user, trips, ships}) {
  const c = PAGE_COPY[lang] || PAGE_COPY.pt;
  const isLimitReached = upgradeReason === 'free_limit_reached';
  // Compute whether free user has used allowance
  const userId = user && user.id;
  const tripsUsed = userId && trips ? trips.filter(tr=>!tr.isDemo&&tr.user_id===userId).length : 0;
  const shipsUsed = userId && ships ? ships.filter(sh=>!sh.isDemo&&sh.user_id===userId).length : 0;

function LegalPage({go, lang, policyKey}) {
  const contentKey = POLICY_KEY_MAP[policyKey] || null;

      React.createElement('div',{style:{padding:'32px 20px',textAlign:'center'}},
        React.createElement('button',{
          onClick:()=>go('home'),

      React.createElement('div',{className:'phd-icon'},

      data.sections.map(([sTitle,sBody],i)=>

          boxShadow:'0 1px 4px rgba(0,0,0,.04)'
