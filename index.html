          showToast('Restored unfinished agreement');
        }
      }
    }catch(e){}
  },[]);

  // ── Supabase helpers ───────────────────────────────────────────────────────
  const upsertAgreement=async(updates)=>{
    const merged={...draft,...updates};
    setDraft(updates);
    // Save to localStorage
    try{localStorage.setItem('agr_draft_'+trip?.id,JSON.stringify(merged));}catch(e){}
    // Save to Supabase
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/shipment_agreements`,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify(merged)
      });
      if(!res.ok){const e=await res.text();console.warn('Supabase upsert warn:',e);}
    }catch(e){console.warn('Supabase offline, saved to localStorage only',e);}
  };

  const uploadPhoto=async(file)=>{
    setUploadingPhoto(true);
    // Step 1: compress & read as base64 so photo shows instantly
    const base64Url=await new Promise(res=>{
      const img=new Image();
      const objUrl=URL.createObjectURL(file);
      img.onload=()=>{
        URL.revokeObjectURL(objUrl);
        const canvas=document.createElement('canvas');
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',0.82));
      };
      img.onerror=()=>{
        const r=new FileReader();
        r.onload=ev=>res(ev.target.result);
        r.readAsDataURL(file);
      };
      img.src=objUrl;
    });
    // Step 2: attempt Supabase Storage upload in background
    const agrId=draft.id||_agrId;
    try{
      const ext=(file.name||'photo').split('.').pop()||'jpg';
      const path=`${agrId}/${Date.now()}.${ext}`;
      const token=(typeof sb!=='undefined'&&sb._token)||SUPABASE_KEY;
      const upRes=await fetch(`${SUPABASE_URL}/storage/v1/object/agreement-photos/${path}`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+token,'Content-Type':file.type||'image/jpeg'},
        body:file
      });
      if(upRes.ok){
        const publicUrl=`${SUPABASE_URL}/storage/v1/object/public/agreement-photos/${path}`;
        return{url:publicUrl,caption:'',uploaded_by:'sender',created_at:new Date().toISOString()};
      }
      const errTxt=await upRes.text();
      console.warn('Storage upload failed:',upRes.status,errTxt);
    }catch(e){console.warn('Storage upload error:',e);}
    // Return base64 — still works for display, signatures, evidence
    return{url:base64Url,caption:'',uploaded_by:'sender',created_at:new Date().toISOString(),local:true};
  };

  // ── Item helpers ───────────────────────────────────────────────────────────
  const addItem=()=>setDraft({items:[...draft.items,{description:'',quantity:1,weight:0,estimated_value:0}]});
  const removeItem=(i)=>setDraft({items:draft.items.filter((_,idx)=>idx!==i)});
  const updateItem=(i,k,v)=>setDraft({items:draft.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)});

  // ── Photo helpers ──────────────────────────────────────────────────────────
  const handleFileAdd=async(e)=>{
    const files=Array.from(e.target.files);
    e.target.value='';
    const newPhotos=[];
    for(const file of files){
      const ph=await uploadPhoto(file);
      newPhotos.push(ph);
    }
    // Use a ref snapshot to avoid stale closure
    setDraft({_addPhotos:newPhotos});
    setUploadingPhoto(false);
  };
  const removePhoto=(i)=>setDraft({photos:draft.photos.filter((_,idx)=>idx!==i)});
  const updateCaption=(i,v)=>setDraft({photos:draft.photos.map((p,idx)=>idx===i?{...p,caption:v}:p)});

  // ── Validation ─────────────────────────────────────────────────────────────
  const canProceed=()=>{
    if(step===1){
      if(draft.items.length===0)return false;
      return draft.items.every(it=>it.description.trim()&&it.quantity>0&&it.weight>=0&&it.estimated_value>=0);
    }
    if(step===2)return draft.photos.length>=2;
    if(step===3)return draft.sender_declaration_accepted&&senderSig.hasSig;
    if(step===4)return draft.traveler_approved!==null&&(draft.traveler_approved||draft.traveler_notes.trim().length>0);
    if(step===5)return draft.traveler_declaration_accepted&&travelerSig.hasSig;
    return true;
  };

  // ── Step handlers ──────────────────────────────────────────────────────────
  const handleNextStep1=async()=>{
    setSaving(true);
    await upsertAgreement({items:draft.items});
    setSaving(false);
    setStep(2);
  };

  const handleNextStep2=async()=>{
    setSaving(true);
    await upsertAgreement({photos:draft.photos});
    setSaving(false);
    setStep(3);
  };

  const handleSenderSign=async()=>{
    if(!canProceed())return;
    setSaving(true);
    const sigData=senderSig.getDataUrl();
    await upsertAgreement({
      sender_declaration_accepted:true,
      sender_signature_data:sigData,
      sender_signed_at:new Date().toISOString(),
      status:'sender_signed'
    });
    setSaving(false);
    setStep(4);
    showToast('Declaration signed. Traveler can now inspect.');
  };

  const handleTravelerInspect=async()=>{
    if(!canProceed())return;
    setSaving(true);
    const newStatus=draft.traveler_approved?'sender_signed':'traveler_rejected';
    await upsertAgreement({
      traveler_approved:draft.traveler_approved,
      traveler_notes:draft.traveler_notes,
      status:newStatus
    });
    setSaving(false);
    if(!draft.traveler_approved){
      showToast('Shipment rejected. Contact sender to resolve.','error');
      setStep('rejected');
    }else{
      setStep(5);
    }
  };

  const handleTravelerSign=async()=>{
    if(!canProceed())return;
    setSaving(true);
    const sigData=travelerSig.getDataUrl();
    await upsertAgreement({
      traveler_declaration_accepted:true,
      traveler_signature_data:sigData,
      traveler_signed_at:new Date().toISOString(),
      status:'completed'
    });
    // Clear localStorage draft
    try{localStorage.removeItem('agr_draft_'+trip?.id);}catch(e){}
    setSaving(false);
    setStep('complete');
    showToast('Agreement completed! ✅ Chat is now unlocked.');
  };

  // ── Totals ─────────────────────────────────────────────────────────────────
  const totalWeight=draft.items.reduce((a,it)=>a+(parseFloat(it.weight)||0)*(parseInt(it.quantity)||1),0).toFixed(2);
  const totalValue=draft.items.reduce((a,it)=>a+(parseFloat(it.estimated_value)||0)*(parseInt(it.quantity)||1),0).toFixed(0);

  // ── Step bar ───────────────────────────────────────────────────────────────
  const STEPS=[
    {n:1,icon:'📦',label:'Items'},
    {n:2,icon:'📷',label:'Photos'},
    {n:3,icon:'✍️',label:'You Sign'},
    {n:4,icon:'🔍',label:'Inspect'},
    {n:5,icon:'✅',label:'Confirm'},
  ];

  const StepBar=()=>(
    <div className="agr-steps">
      {STEPS.map((s,i)=>{
        const done=typeof step==='number'&&s.n<step;
        const active=step===s.n;
        return(
          <React.Fragment key={s.n}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
              <div className="agr-dot" style={{
                background:done?'var(--green)':active?'var(--navy)':'var(--bord2)',
                color:done||active?'#fff':'var(--text4)',
                boxShadow:active?'0 2px 12px rgba(10,37,64,.3)':'none',
                fontSize:done?14:12
              }}>{done?'✓':s.icon}</div>
              <span className="agr-step-lbl" style={{color:active?'var(--navy)':done?'var(--green)':'var(--text4)'}}>{s.label}</span>
            </div>
            {i<STEPS.length-1&&<div className="agr-line" style={{background:done?'var(--green)':'var(--bord)'}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );

  // ── COMPLETE SCREEN ────────────────────────────────────────────────────────
  if(step==='complete')return(
    <div className="page"><div className="agr-page">
      <div className="agr-complete">
        <div style={{fontSize:72,marginBottom:16}}>🎉</div>
        <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:22,color:'var(--navy)',marginBottom:8}}>Agreement Complete</h2>
        <p style={{color:'var(--text3)',fontSize:14,lineHeight:1.7,marginBottom:20}}>Both parties have signed. This agreement is legally binding and stored securely.</p>
        <div className="agr-id-badge">📋 {draft.id}</div>
        <div style={{background:'var(--gpale)',border:'1px solid var(--gborder)',borderRadius:14,padding:'16px',margin:'20px 0',textAlign:'left'}}>
          <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>What was agreed:</div>
          {draft.items.map((it,i)=>(
            <div key={i} style={{fontSize:13,color:'var(--text2)',marginBottom:5,display:'flex',gap:8}}>
              <span style={{color:'var(--green)',fontWeight:700}}>{it.quantity}×</span>
              <span>{it.description}{it.weight>0?` · ${it.weight}kg`:''}{it.estimated_value>0?` · ~€${it.estimated_value}`:''}</span>
            </div>
          ))}
          <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--gborder)',fontSize:12,color:'var(--text3)'}}>
            📷 {draft.photos.length} photos · ~{totalWeight}kg · ~€{totalValue}
          </div>
        </div>
        <p style={{fontSize:12,color:'var(--text4)',marginBottom:20,lineHeight:1.6}}>
          Keep your agreement ID: <strong style={{color:'var(--navy)'}}>{draft.id}</strong><br/>
          Reference this in any dispute with AfroRoute or legal authorities.
        </p>
        <button onClick={onComplete} style={{width:'100%',background:'var(--green)',color:'#fff',border:'none',padding:'15px',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>
          Open Chat →
        </button>
      </div>
    </div></div>
  );

  // ── REJECTED SCREEN ────────────────────────────────────────────────────────
  if(step==='rejected')return(
    <div className="page"><div className="agr-page">
      <div className="agr-complete">
        <div style={{fontSize:64,marginBottom:16}}>⚠️</div>
        <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:22,color:'#b91c1c',marginBottom:8}}>Shipment Rejected</h2>
        <p style={{color:'var(--text3)',fontSize:14,lineHeight:1.7,marginBottom:16}}>The traveler found discrepancies and rejected the shipment.</p>
        {draft.traveler_notes&&(
          <div className="agr-danger" style={{textAlign:'left',marginBottom:16}}>
            <strong>Traveler's notes:</strong><br/>{draft.traveler_notes}
          </div>
        )}
        <div style={{background:'var(--surf2)',borderRadius:12,padding:'14px',marginBottom:20,textAlign:'left',fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
          <strong>What to do:</strong><br/>
          Resolve the discrepancy with the traveler, then start a new agreement. Agreement ID <strong>{draft.id}</strong> is saved as a rejection record.
        </div>
        <button onClick={onCancel} style={{width:'100%',background:'var(--navy)',color:'#fff',border:'none',padding:'14px',borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>
          ← Go Back
        </button>
      </div>
    </div></div>
  );

  // ── MAIN WIZARD ────────────────────────────────────────────────────────────
  return(
    <div className="page">
      <div className="agr-page">

        {/* Hero */}
        <div className="agr-hero">
          <button onClick={onCancel} style={{background:'rgba(255,255,255,.1)',border:'none',color:'rgba(255,255,255,.7)',padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:14,fontFamily:"'Sora',sans-serif"}}>← Back</button>
          <div style={{fontSize:28,marginBottom:6}}>📋</div>
          <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:20,color:'#fff',marginBottom:4}}>Shipment Agreement</h2>
          <p style={{color:'rgba(255,255,255,.6)',fontSize:13,lineHeight:1.5,margin:0}}>
            Both parties must document and sign before any handover.<br/>
            <strong style={{color:'rgba(255,255,255,.75)',fontSize:11}}>Agreement ID: {draft.id||'…'}</strong>
          </p>
        </div>

        <StepBar/>

        {/* ═══ STEP 1 — ITEMS ═══════════════════════════════════════════════ */}
        {step===1&&(
          <div>
            <div className="agr-card">
              <div className="agr-card-title">📦 List every item being sent</div>
              <p style={{fontSize:12,color:'var(--text3)',marginBottom:14,lineHeight:1.6}}>
                Be precise. Include brand, colour, size, condition. This is your legal record.
              </p>
              {draft.items.map((it,i)=>(
                <div key={i} className="agr-item">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <span style={{fontWeight:700,fontSize:12,color:'var(--navy)'}}>Item {i+1}</span>
                    {draft.items.length>1&&<button onClick={()=>removeItem(i)} style={{background:'none',border:'none',color:'#ef4444',fontSize:12,cursor:'pointer',fontWeight:700}}>✕ Remove</button>}
                  </div>
                  <div className="ff" style={{marginBottom:8}}>
                    <label className="fl">Description <span style={{color:'#ef4444'}}>*</span></label>
                    <input className="fi" value={it.description} onChange={e=>updateItem(i,'description',e.target.value)} placeholder="e.g. Blue Nike Air Max, size 42, new"/>
                  </div>
                  <div className="agr-item-grid">
                    <div className="ff">
                      <label className="fl">Quantity <span style={{color:'#ef4444'}}>*</span></label>
                      <input className="fi" type="number" min="1" value={it.quantity} onChange={e=>updateItem(i,'quantity',parseInt(e.target.value)||1)}/>
                    </div>
                    <div className="ff">
                      <label className="fl">Weight (kg)</label>
                      <input className="fi" type="number" min="0" step="0.1" placeholder="0.0" value={it.weight||''} onChange={e=>updateItem(i,'weight',parseFloat(e.target.value)||0)}/>
                    </div>
                    <div className="ff">
                      <label className="fl">Value (€)</label>
                      <input className="fi" type="number" min="0" placeholder="0" value={it.estimated_value||''} onChange={e=>updateItem(i,'estimated_value',parseFloat(e.target.value)||0)}/>
                    </div>
                  </div>
                </div>
              ))}
              <button onClick={addItem} style={{width:'100%',background:'none',border:'1.5px dashed var(--bord2)',color:'var(--text3)',padding:'10px',borderRadius:10,fontWeight:600,fontSize:13,cursor:'pointer',marginTop:4,transition:'all .18s'}}>
                + Add Another Item
              </button>
              <div style={{marginTop:12,background:'var(--gpale)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--green)',fontWeight:600}}>
                {draft.items.length} item type{draft.items.length!==1?'s':''} · ~{totalWeight}kg · ~€{totalValue}
              </div>
            </div>
            <div className="agr-warn">
              <strong>⚠️ Prohibited:</strong> No cash, drugs, weapons, or dangerous goods. Any prohibited item triggers immediate account suspension and legal reporting.
            </div>
            <div className="agr-nav">
              <button className="agr-btn-next" disabled={!canProceed()||saving} onClick={handleNextStep1}>
                {saving?'Saving…':'Next: Add Photos →'}
              </button>
            </div>
          </div>
        )}

        {/* ═══ STEP 2 — PHOTOS ══════════════════════════════════════════════ */}
        {step===2&&(
          <div>
            <div className="agr-card">
              <div className="agr-card-title">📷 Photograph everything</div>
              <p style={{fontSize:12,color:'var(--text3)',marginBottom:14,lineHeight:1.6}}>
                Open every package. Show all contents clearly. Minimum <strong>2 photos</strong>. More is always better.
              </p>
              <div className="agr-photo-grid">
                {draft.photos.map((ph,i)=>(
                  <div key={i} className="agr-photo-cell">
                    <img src={ph.url} className="agr-photo-thumb" alt={ph.caption||`Photo ${i+1}`}/>
                    <button className="agr-photo-del" onClick={()=>removePhoto(i)}>✕</button>
                  </div>
                ))}
                <div className="agr-photo-add" onClick={()=>!uploadingPhoto&&fileInputRef.current?.click()}>
                  {uploadingPhoto?<>⏳<span>Uploading…</span></>:<><span style={{fontSize:24}}>📷</span><span>Add Photo</span></>}
                </div>
              </div>
              <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleFileAdd}/>
              {draft.photos.length>0&&(
                <div>
                  <p style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:8}}>Add captions (recommended):</p>
                  {draft.photos.map((ph,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <img src={ph.url} style={{width:36,height:36,borderRadius:6,objectFit:'cover',flexShrink:0}}/>
                      <input className="fi" style={{fontSize:12}} value={ph.caption} onChange={e=>updateCaption(i,e.target.value)} placeholder={`Photo ${i+1} description…`}/>
                    </div>
                  ))}
                </div>
              )}
              <div style={{marginTop:10,fontSize:12,fontWeight:600,color:draft.photos.length>=2?'var(--green)':'#ef4444'}}>
                {draft.photos.length>=2?`✓ ${draft.photos.length} photos added`:`⚠ ${2-draft.photos.length} more photo${2-draft.photos.length===1?'':'s'} needed`}
              </div>
            </div>
            <div style={{background:'var(--surf2)',border:'1px solid var(--bord)',borderRadius:12,padding:'12px 14px',fontSize:12,color:'var(--text3)',lineHeight:1.6,marginBottom:12}}>
              💡 <strong>Tips:</strong> Show items next to each other, show open packages, include serial numbers, photograph any existing damage or wear.
            </div>
            <div className="agr-nav">
              <button className="agr-btn-back" onClick={()=>setStep(1)}>← Back</button>
              <button className="agr-btn-next" disabled={!canProceed()||saving} onClick={handleNextStep2}>
                {saving?'Saving…':'Next: Sign Declaration →'}
              </button>
            </div>
          </div>
        )}

        {/* ═══ STEP 3 — SENDER SIGNATURE ════════════════════════════════════ */}
        {step===3&&(
          <div>
            <div className="agr-card">
              <div className="agr-card-title">✍️ Your Declaration (Sender)</div>
              <div className="agr-legal">
                <strong>AfroRoute Shipment Agreement — Sender Declaration</strong><br/><br/>
                I, <strong>{user?.name||'the Sender'}</strong>, hereby declare that:<br/><br/>
                1. The items listed below are the complete and accurate contents of the package(s) I am handing over to the traveller.<br/><br/>
                2. All photographs attached to this agreement are an accurate, unaltered representation of the items being shipped.<br/><br/>
                3. All items comply with AfroRoute's prohibited items policy and applicable customs, import, and export laws of both the origin and destination country.<br/><br/>
                4. I understand that providing false or incomplete information in this agreement may constitute fraud and could result in criminal liability, account suspension, and reporting to relevant authorities.<br/><br/>
                5. I agree that this signed document, including the item list and photographs, may be used as legal evidence in any dispute, claim, or proceeding arising from this shipment.<br/><br/>
                <strong>Items being sent:</strong><br/>
                {draft.items.map((it,i)=><span key={i}>{i+1}. {it.quantity}× {it.description}{it.weight>0?` (${it.weight}kg each)`:''}{it.estimated_value>0?` · ~€${it.estimated_value}`:''}<br/></span>)}
                <br/>Total: ~{totalWeight}kg · ~€{totalValue} · {draft.photos.length} photos attached
              </div>
              <div className="agr-check-row" onClick={()=>setDraft({sender_declaration_accepted:!draft.sender_declaration_accepted})}>
                <input type="checkbox" checked={draft.sender_declaration_accepted} onChange={()=>{}} style={{width:18,height:18,flexShrink:0,marginTop:1,accentColor:'var(--green)',cursor:'pointer'}}/>
                <label>I confirm this declaration is true and accurate to the best of my knowledge, and I consent to this document being used as evidence.</label>
              </div>
              <p style={{fontSize:13,fontWeight:600,color:'var(--text2)',marginBottom:8}}>Draw your signature:</p>
              <div className={`agr-sig-box ${senderSig.hasSig?'has-sig':''}`}>
                <canvas ref={senderCanvasRef} className="agr-sig-canvas"/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6,alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:600,color:senderSig.hasSig?'var(--green)':'var(--text4)'}}>
                  {senderSig.hasSig?'✓ Signature captured':'Draw above with finger or mouse'}
                </span>
                <button onClick={senderSig.clear} style={{background:'none',border:'none',color:'var(--text3)',fontSize:12,cursor:'pointer',fontWeight:600}}>Clear</button>
              </div>
            </div>
            <div className="agr-nav">
              <button className="agr-btn-back" onClick={()=>setStep(2)}>← Back</button>
              <button className={`agr-btn-next ${canProceed()?'agr-btn-green':''}`} disabled={!canProceed()||saving} onClick={handleSenderSign}>
                {saving?'Saving…':'Sign & Continue →'}
              </button>
            </div>
          </div>
        )}

        {/* ═══ STEP 4 — TRAVELER INSPECTION ═════════════════════════════════ */}
        {step===4&&(
          <div>
            <div className="agr-card">
              <div className="agr-card-title">🔍 Traveler Inspection</div>
              <p style={{fontSize:13,color:'var(--text3)',marginBottom:14,lineHeight:1.6}}>
                <strong>{trip?.user||'The traveler'}</strong> must physically check every item against the list and photos, then confirm below.
              </p>
              <div style={{marginBottom:16}}>
                <p style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:8}}>Items to verify:</p>
                {draft.items.map((it,i)=>(
                  <div key={i} style={{display:'flex',gap:10,padding:'10px 12px',background:'var(--surf2)',borderRadius:8,marginBottom:6,alignItems:'flex-start'}}>
                    <span style={{fontSize:18,flexShrink:0}}>📦</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:13,color:'var(--navy)'}}>{it.quantity}× {it.description}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>
                        {it.weight>0&&`${it.weight}kg each`}{it.weight>0&&it.estimated_value>0&&' · '}{it.estimated_value>0&&`~€${it.estimated_value}`}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {draft.photos.length>0&&(
                <div style={{marginBottom:16}}>
                  <p style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:8}}>Verify against sender photos:</p>
                  <div className="agr-photo-grid">
                    {draft.photos.map((ph,i)=>(
                      <div key={i} style={{aspectRatio:'1',borderRadius:10,overflow:'hidden',border:'2px solid var(--bord)'}}>
                        <img src={ph.url} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={ph.caption||`Photo ${i+1}`}/>
                      </div>
                    ))}
                  </div>
                  {draft.photos.some(p=>p.caption)&&draft.photos.map((ph,i)=>ph.caption&&<div key={i} style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>📷 {i+1}: {ph.caption}</div>)}
                </div>
              )}
              {draft.sender_signature_data&&(
                <div style={{marginBottom:16}}>
                  <p style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:6}}>Sender signature:</p>
                  <img src={draft.sender_signature_data} className="agr-sig-preview" alt="Sender signature" style={{border:'1px solid var(--bord)',borderRadius:10}}/>
                </div>
              )}
              <p style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>Your decision:</p>
              <div className="agr-decision-row">
                <button className={`agr-decision-btn${draft.traveler_approved===true?' accept':''}`} onClick={()=>setDraft({traveler_approved:true})}>
                  ✅ All matches — Accept
                </button>
                <button className={`agr-decision-btn${draft.traveler_approved===false?' reject':''}`} onClick={()=>setDraft({traveler_approved:false})}>
                  ❌ Something wrong — Reject
                </button>
              </div>
              {draft.traveler_approved===false&&(
                <div>
                  <div className="ff">
                    <label className="fl">Describe the discrepancy <span style={{color:'#ef4444'}}>*</span></label>
                    <textarea className="fta" value={draft.traveler_notes} onChange={e=>setDraft({traveler_notes:e.target.value})} placeholder="What is missing or different from what was listed?" style={{minHeight:80}}/>
                  </div>
                  <div className="agr-danger">Rejecting will stop the process. A rejection record will be saved with your notes as evidence.</div>
                </div>
              )}
              {draft.traveler_approved===true&&(
                <div className="ff">
                  <label className="fl">Optional notes</label>
                  <textarea className="fta" value={draft.traveler_notes} onChange={e=>setDraft({traveler_notes:e.target.value})} placeholder="Any observations you want on record…" style={{minHeight:60}}/>
                </div>
              )}
            </div>
            <div className="agr-nav">
              <button className="agr-btn-back" onClick={()=>setStep(3)}>← Back</button>
              <button className={`agr-btn-next ${canProceed()&&draft.traveler_approved===false?'':''}${canProceed()&&draft.traveler_approved===true?'agr-btn-green':''}`}
                disabled={!canProceed()||saving}
                style={draft.traveler_approved===false?{background:'#ef4444'}:{}}
                onClick={handleTravelerInspect}>
                {saving?'Saving…':draft.traveler_approved===false?'Reject Shipment':'Proceed to Sign →'}
              </button>
            </div>
          </div>
        )}

        {/* ═══ STEP 5 — TRAVELER SIGNATURE ══════════════════════════════════ */}
        {step===5&&(
          <div>
            <div className="agr-card">
              <div className="agr-card-title">✅ Your Declaration (Traveler)</div>
              <div className="agr-legal">
                <strong>AfroRoute Shipment Agreement — Traveler Declaration</strong><br/><br/>
                I, <strong>{trip?.user||'the Traveler'}</strong>, hereby declare that:<br/><br/>
                1. I have physically inspected all items listed in this agreement and confirmed they match the descriptions and photographs provided by the sender.<br/><br/>
                2. I accept responsibility for transporting the listed items from <strong>{trip?.from||'the origin'}</strong> to <strong>{trip?.to||'the destination'}</strong>.<br/><br/>
                3. To the best of my knowledge, none of the items are prohibited under AfroRoute's policy or applicable law.<br/><br/>
                4. I understand this signed document may be used as legal evidence in any dispute or proceeding.<br/><br/>
                5. I agree to deliver the items in the same condition as received, absent circumstances beyond my control.<br/><br/>
                {draft.traveler_notes&&<><strong>My notes on inspection:</strong> {draft.traveler_notes}<br/><br/></>}
                <strong>Items accepted:</strong><br/>
                {draft.items.map((it,i)=><span key={i}>{i+1}. {it.quantity}× {it.description}<br/></span>)}
                <br/>Total: ~{totalWeight}kg · {draft.photos.length} photos on record
              </div>
              <div className="agr-check-row" onClick={()=>setDraft({traveler_declaration_accepted:!draft.traveler_declaration_accepted})}>
                <input type="checkbox" checked={draft.traveler_declaration_accepted} onChange={()=>{}} style={{width:18,height:18,flexShrink:0,marginTop:1,accentColor:'var(--green)',cursor:'pointer'}}/>
                <label>I confirm I have inspected all items and agree to the above declaration. I consent to this document being used as evidence.</label>
              </div>
              <p style={{fontSize:13,fontWeight:600,color:'var(--text2)',marginBottom:8}}>Draw your signature:</p>
              <div className={`agr-sig-box ${travelerSig.hasSig?'has-sig':''}`}>
                <canvas ref={travelerCanvasRef} className="agr-sig-canvas"/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6,alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:600,color:travelerSig.hasSig?'var(--green)':'var(--text4)'}}>
                  {travelerSig.hasSig?'✓ Signature captured':'Draw above with finger or mouse'}
                </span>
                <button onClick={travelerSig.clear} style={{background:'none',border:'none',color:'var(--text3)',fontSize:12,cursor:'pointer',fontWeight:600}}>Clear</button>
              </div>
            </div>
            <div className="agr-nav">
              <button className="agr-btn-back" onClick={()=>setStep(4)}>← Back</button>
              <button className={`agr-btn-next ${canProceed()?'agr-btn-green':''}`} disabled={!canProceed()||saving} onClick={handleTravelerSign}>
                {saving?'Saving…':'Sign & Complete Agreement ✅'}
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


function App(){
const[lang,setLang]=useState('pt');
const[page,setPage]=useState('home');
const[loggedIn,setLI]=useState(false);
const[subscribed,setSub]=useState(false);
const[user,setUser]=useState(null);
const[appLoading,setAppLoading]=useState(true);
const[toast,setToast]=useState(null);
const[modal,setModal]=useState(null);
const[savedIds,setSaved]=useState(new Set());
const[detail,setDetail]=useState(null);
const[trips,setTrips]=useState([]);
const[ships,setShips]=useState([]);
const[convos,setConvos]=useState([]);
const[activeConvo,setConvo]=useState(null);
const[chatIn,setChatIn]=useState('');
const chatEnd=useRef(null);
const[agreementFlow,setAgreementFlow]=React.useState(null);
const t=T[lang];

// Handle OAuth redirect (Apple/Google sign-in returns here)
useEffect(()=>{
  (async()=>{
    const oauthUser = await sb.getSessionFromURL();
    if(oauthUser && oauthUser.id){
      try{
        let profile = await sb.getProfile(oauthUser.id);
        if(!profile){
          // First OAuth login — create profile
          await sb.upsertProfile({
            id:oauthUser.id,
            name:oauthUser.user_metadata?.full_name||oauthUser.email?.split('@')[0]||'User',
            country:'',whatsapp:'',verification_status:'oauth'
          });
          profile = await sb.getProfile(oauthUser.id);
        }
        setUser({id:oauthUser.id,email:oauthUser.email,name:profile?.name||oauthUser.email,country:profile?.country||'',wa:profile?.whatsapp||'',isSubscribed:profile?.is_subscribed||false});
        setLI(true);setSub(profile?.is_subscribed||false);
        showToast('Welcome, '+(oauthUser.user_metadata?.full_name||oauthUser.email||'').split(' ')[0]+'! 👋');
      }catch(e){ console.error('OAuth profile setup:', e); }
    }
  })();
},[]);

const loadListings=async(isLoggedIn)=>{
  try{
    // Public read — use anon key only, no user token needed
    const publicHeaders={'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`};
    const fetchPublic=async(table,query,filters)=>{
      const url=`${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(query)}&${filters}`;
      const r=await fetch(url,{headers:{...publicHeaders,'Prefer':'return=representation'}});
      if(!r.ok){const e=await r.text();console.warn('Public fetch error:',table,e);return[];}
      return r.json();
    };
    const[rt,rs]=await Promise.all([
      fetchPublic('trips','id,user_id,from_country,from_city,to_country,to_city,travel_date,airline,kg_available,price_per_kg,open_to_offers,categories,notes,status,created_at,profiles(name,country)','status=eq.active&order=created_at.desc'),
      fetchPublic('shipments','id,user_id,from_country,from_city,to_country,to_city,preferred_date,category,weight_kg,budget_per_kg,description,is_urgent,status,created_at,profiles(name,country)','status=eq.active&order=created_at.desc'),
    ]);
    const realTrips=rt.map(r=>({id:r.id,user:r.profiles?.name||'User',av:ini(r.profiles?.name||'User'),country:r.profiles?.country||'',from:r.from_country,fc:r.from_city||'',to:r.to_country,tc:r.to_city||'',date:r.travel_date,airline:r.airline||'',kg:r.kg_available,price:r.price_per_kg||0,open:r.open_to_offers||false,cats:r.categories||[],notes:r.notes||'',status:r.status,verified:true,rating:4.7,reviews:0,user_id:r.user_id,created:r.created_at,isDemo:false}));
    const realShips=rs.map(r=>({id:r.id,user:r.profiles?.name||'User',av:ini(r.profiles?.name||'User'),country:r.profiles?.country||'',from:r.from_country,fc:r.from_city||'',to:r.to_country,tc:r.to_city||'',pref_date:r.preferred_date,category:r.category,kg:r.weight_kg,budget:r.budget_per_kg,desc:r.description||'',urgent:r.is_urgent||false,status:r.status,verified:true,rating:4.7,reviews:0,user_id:r.user_id,created:r.created_at,isDemo:false}));
    // Logged in → always show only real data (no demos ever)
    // Visitor (not logged in) → show real data if exists, otherwise show demo cards
    if(isLoggedIn){
      setTrips(realTrips);
      setShips(realShips);
    } else {
      setTrips(realTrips.length>0 ? realTrips : TRIPS);
      setShips(realShips.length>0 ? realShips : SHIPS);
    }
  }catch(e){
    // On error: logged in users see empty, visitors see demo
    if(!isLoggedIn){ setTrips(TRIPS); setShips(SHIPS); }
    else { setTrips([]); setShips([]); }
  }
};

const loadConversations=async(userId)=>{
  try{
    const rows=await sb.select('conversations','id,user_a,user_b,listing_id,listing_type,created_at','or=(user_a.eq.'+userId+',user_b.eq.'+userId+')&order=created_at.desc');
    const mapped=rows.map(c=>({id:c.id,user:'User',av:'U',listing:c.listing_type||'',unread:0,last:'',lastTime:'',msgs:[],other_user_id:c.user_a===userId?c.user_b:c.user_a}));
    setConvos(mapped);
  }catch(e){console.log('Convos load failed:',e.message);}
};

useEffect(()=>{
  (async()=>{
    // Handle Stripe payment redirect
    const urlParams = new URLSearchParams(window.location.search);
    const paymentStatus = urlParams.get('payment');
    if(paymentStatus === 'success'){
      window.history.replaceState(null, '', window.location.pathname);
      setSub(true);
      // Store in localStorage so subscription persists across sessions
      try{localStorage.setItem('ar_sub','1');}catch(e){}
      showToast('🎉 Payment successful! Welcome to AfroRoute Pro.');
      // Update Supabase
      try{
        const savedToken=localStorage.getItem('ar_tok');
        if(savedToken){
          sb._token=savedToken;
          const u=await sb.refreshSession();
          if(u){
            await sb.update('profiles',{is_subscribed:true},`id=eq.${u.id}`).catch(()=>{});
          }
        }
      }catch(e){console.log('Sub update:',e.message);}
    } else if(paymentStatus === 'cancelled'){
      window.history.replaceState(null, '', window.location.pathname);
      showToast('Payment cancelled. You can subscribe anytime.', 'warning');
    } else if(paymentStatus === 'unsubscribed'){
      window.history.replaceState(null, '', window.location.pathname);
      try{localStorage.removeItem('ar_sub');}catch(e){}
      setSub(false);
    }
    try{
      const savedToken=localStorage.getItem('ar_tok');
      if(savedToken){
        sb._token=savedToken;
        const u=await sb.refreshSession();
        if(u){
          const profile=await sb.getProfile(u.id);
          const savedAvatar=localStorage.getItem('ar_av_'+u.id)||null;
          // Check subscription from Supabase OR localStorage fallback
          const isSub=profile?.is_subscribed||localStorage.getItem('ar_sub')==='1'||false;
          // If localStorage says subscribed but Supabase doesn't, sync it
          if(localStorage.getItem('ar_sub')==='1'&&!profile?.is_subscribed){
            sb.update('profiles',{is_subscribed:true},`id=eq.${u.id}`).catch(()=>{});
          }
          setUser({id:u.id,email:u.email,name:profile?.name||u.user_metadata?.name||u.email.split('@')[0],country:profile?.country||'',wa:profile?.whatsapp||'',isSubscribed:isSub,avatarUrl:savedAvatar});
          setLI(true);setSub(isSub);
          loadConversations(u.id);
          loadListings(true);
        } else {
          loadListings(false); // no session = visitor, show demos
        }
      }
    }catch(e){
      console.log('Session restore:',e.message);
      loadListings(false); // fallback = visitor
    }
    setAppLoading(false);
  })();
},[]);

useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'});},[activeConvo,convos]);
useEffect(()=>{window.scrollTo(0,0);},[page]);

const showToast=useCallback((msg,type='success')=>{setToast({msg,type,key:Date.now()});setTimeout(()=>setToast(null),3200);},[]);
const go=(p)=>{setDetail(null);setPage(p);};

const handleLogin=async(formData)=>{
  try{
    if(formData.isNew){
      const data=await sb.signUp(formData.email,formData.password,formData.name,formData.country,formData.wa);
      // Handle both confirmed (data.user) and unconfirmed (data.user null, session null)
      const userId = data?.user?.id || data?.session?.user?.id;
      if(userId){
        try{
          await sb.upsertProfile({
            id:userId,
            name:formData.name,
            country:formData.country,
            whatsapp:formData.wa,
            id_type:formData.idType||null,
            verification_status:'pending',
          });
        }catch(profileErr){
          console.log('Profile upsert error (non-fatal):', profileErr.message);
        }
        // Upload ID document to Supabase Storage
        if(formData.idImageData){
          try{
            const idBlob = await (await fetch(formData.idImageData)).blob();
            const idPath = `${userId}/id_document.jpg`;
            await sb.uploadFile('verifications', idPath, idBlob, 'image/jpeg');
            console.log('ID uploaded to Supabase Storage');
          }catch(uploadErr){
            console.log('ID upload error (non-fatal):', uploadErr.message);
          }
        }
        // Upload selfie to Supabase Storage
        if(formData.selfieData){
          try{
            const selfieBlob = await (await fetch(formData.selfieData)).blob();
            const selfiePath = `${userId}/selfie.jpg`;
            await sb.uploadFile('verifications', selfiePath, selfieBlob, 'image/jpeg');
            console.log('Selfie uploaded to Supabase Storage');
          }catch(uploadErr){
            console.log('Selfie upload error (non-fatal):', uploadErr.message);
          }
        }
        setUser({id:userId,email:formData.email,name:formData.name,country:formData.country,wa:formData.wa,isSubscribed:false});
        setLI(true);setSub(false);loadListings(true);
        showToast('Welcome to AfroRoute, '+formData.name.split(' ')[0]+'! 🎉');go('home');
      }else{
        // Email confirmation required — still navigate home and show message
        showToast('Account created! Check your email to confirm then log in.');
        go('home');
      }
    }else{
      const data=await sb.signIn(formData.email,formData.password);
      const profile=await sb.getProfile(data.user.id);
      const loginAvatar=localStorage.getItem('ar_av_'+data.user.id)||null;
      const isSubLogin=profile?.is_subscribed||localStorage.getItem('ar_sub')==='1'||false;
      if(localStorage.getItem('ar_sub')==='1'&&!profile?.is_subscribed){
        sb.update('profiles',{is_subscribed:true},`id=eq.${data.user.id}`).catch(()=>{});
      }
      setUser({id:data.user.id,email:formData.email,name:profile?.name||formData.email.split('@')[0],country:profile?.country||'',wa:profile?.whatsapp||'',isSubscribed:isSubLogin,avatarUrl:loginAvatar});
      setLI(true);setSub(isSubLogin);
      loadConversations(data.user.id);
      loadListings(true); // logged in — hide demos
      showToast('Welcome back, '+((profile?.name||formData.email.split('@')[0]).split(' ')[0])+'! 👋');go('home');
    }
  }catch(e){showToast(e.message||'Authentication failed','error');}
};

const handleLogout=async()=>{
  await sb.signOut();
  setLI(false);setUser(null);setSub(false);setConvos([]);
  loadListings(false); // visitor again — show demos
  showToast(t.toast_logged_out,'warning');go('home');
};

const handleSaveProfile=async(updated)=>{
  try{
    await sb.upsertProfile({id:user.id,name:updated.name,country:updated.country,whatsapp:updated.wa});
    setUser(prev=>({...prev,...updated}));showToast(t.toast_profile_saved);
  }catch(e){showToast('Failed to save','error');}
};

const handlePostTrip=async(form)=>{
  try{
    await sb.insert('trips',{user_id:user.id,from_country:form.from,from_city:form.fc,to_country:form.to,to_city:form.tc,travel_date:form.date,airline:form.airline,kg_available:parseFloat(form.kg),price_per_kg:form.open?null:parseFloat(form.price),open_to_offers:form.open,categories:form.cats,notes:form.notes,status:form.status});
    showToast(t.toast_trip_posted);loadListings();go('profile');
  }catch(e){showToast('Failed: '+e.message,'error');}
};

const handlePostShip=async(form)=>{
  try{
    await sb.insert('shipments',{user_id:user.id,from_country:form.from,from_city:form.fc,to_country:form.to,to_city:form.tc,preferred_date:form.pref_date,category:form.category,weight_kg:parseFloat(form.kg),budget_per_kg:parseFloat(form.budget),description:form.desc,is_urgent:form.urgent,status:form.status});
    showToast(t.toast_ship_posted);loadListings();go('profile');
  }catch(e){showToast('Failed: '+e.message,'error');}
};

const openChat=(item,type)=>{
  const ex=convos.find(c=>c.other_user_id===item.user_id);
  if(ex){setConvo(ex);}else{
    (async()=>{
      try{
        const[nc]=await sb.insert('conversations',{user_a:user.id,user_b:item.user_id,listing_id:item.id,listing_type:type});
        const newC={id:nc.id,user:item.user,av:ini(item.user),listing:`${item.from} → ${item.to}`,unread:0,last:'',lastTime:'now',msgs:[],other_user_id:item.user_id};
        setConvos(p=>[newC,...p]);setConvo(newC);
      }catch(e){
        const newC={id:Date.now(),user:item.user,av:ini(item.user),listing:`${item.from} → ${item.to}`,unread:0,last:'',lastTime:'now',msgs:[],other_user_id:item.user_id};
        setConvos(p=>[newC,...p]);setConvo(newC);
      }
    })();
  }
  setPage('messages');
};
const handleContact=(item,type)=>{
  if(!loggedIn){setPage('auth');return;}
  if(!subscribed){setModal({type:'paywall_msg'});return;}
  // Route through shipment agreement before opening chat
  setAgreementFlow({item,type});
  setPage('agreement');
};

const handleSave=(id,type)=>{
  if(!loggedIn){setPage('auth');return;}
  const key=`${type}-${id}`;const isSaved=savedIds.has(key);
  setSaved(prev=>{const next=new Set(prev);if(isSaved){next.delete(key);showToast(t.toast_unsaved,'warning');}else{next.add(key);showToast(t.toast_saved);}return next;});
  if(!isSaved)sb.insert('saved',{user_id:user.id,listing_id:id,listing_type:type}).catch(()=>{});
  else sb.delete('saved',`user_id=eq.${user.id}&listing_id=eq.${id}&listing_type=eq.${type}`).catch(()=>{});
};

const isSaved=(id,type)=>savedIds.has(`${type}-${id}`);

const sendMsg=()=>{
  if(!chatIn.trim()||!activeConvo)return;
  const blockRe=/(\b\d{6,}\b)|(@)|https?:\/\/|www\.|whatsapp|telegram|instagram|call me|text me|outside app|fora da plataforma|meu numero|my number/i;
  if(blockRe.test(chatIn)){ showToast(lang==='pt'?'Para sua segurança, mantenha a comunicação dentro da AfroRoute até confirmação.':'For your safety, keep communication inside AfroRoute until confirmed.','warning'); return; }
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const nm={from:'me',text:chatIn,t:now};
  setConvos(p=>p.map(c=>c.id===activeConvo.id?{...c,msgs:[...c.msgs,nm],last:chatIn,lastTime:'now'}:c));
  setConvo(p=>({...p,msgs:[...p.msgs,nm]}));
  if(user)sb.insert('messages',{conversation_id:activeConvo.id,sender_id:user.id,content:chatIn}).catch(()=>{});
  setChatIn('');
  setTimeout(()=>{
    const rm={from:'them',text:"Thanks for your message! I'll get back to you shortly.",t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
    setConvos(p=>p.map(c=>c.id===activeConvo.id?{...c,msgs:[...c.msgs,rm]}:c));
    setConvo(p=>({...p,msgs:[...p.msgs,rm]}));
  },1500);
};

const handleSubscribe=async()=>{
  if(!loggedIn){go('auth');return;}
  try{
    await startStripeCheckout(user.email,user.id);
  }catch(e){
    console.error('Stripe error:',e.message);
    showToast('Payment error: '+(e.message||'Unknown error'),'error');
  }
};

case 'post-trip':return <div className="page"><div className="phd"><div className="phd-icon">✈️</div><div><div className="phd-title">{t.post_trip_title}</div><div className="phd-sub">{t.post_trip_sub}</div></div></div><div style={{padding:'0 16px 32px'}}>{!loggedIn?<PW t={t} type="post" onSub={()=>go('auth')}/>:!subscribed?<PW t={t} type="post" onSub={()=>go('pricing')}/>:<PostTripForm t={t} onSubmit={handlePostTrip}/>}</div></div>;
case 'post-shipment':return <div className="page"><div className="phd"><div className="phd-icon">📦</div><div><div className="phd-title">{t.post_ship_title}</div><div className="phd-sub">{t.post_ship_sub}</div></div></div><div style={{padding:'0 16px 32px'}}>{!loggedIn?<PW t={t} type="post" onSub={()=>go('auth')}/>:!subscribed?<PW t={t} type="post" onSub={()=>go('pricing')}/>:<PostShipForm t={t} onSubmit={handlePostShip}/>}</div></div>;
case 'messages':return <div className="page" style={{padding:0}}>{!loggedIn?<div style={{padding:'0 16px'}}><PW t={t} type="msg" onSub={()=>go('auth')}/></div>:!subscribed?<div style={{padding:'0 16px'}}><PW t={t} type="msg" onSub={()=>go('pricing')}/></div>:<div className="msg-layout"><div className="conv-sb">{convos.map(c=><div key={c.id} className={`conv-item ${activeConvo?.id===c.id?'active':''}`} onClick={()=>setConvo(c)}><div style={{position:'relative'}}><Av name={c.user} size={38}/>{c.unread>0&&<span className="cunread">{c.unread}</span>}</div><div className="conv-name">{c.user.split(' ')[0]}</div></div>)}</div><div className="chat-area">{activeConvo?<><div className="chat-hd"><Av name={activeConvo.user} size={36}/><div style={{flex:1,minWidth:0}}><div className="chat-hn">{activeConvo.user}</div><div style={{display:'flex',gap:6,marginTop:2,flexWrap:'wrap'}}><div className="chat-hs">● {t.online}</div>{activeConvo.listing&&<div className="chat-hl">{activeConvo.listing}</div>}</div></div></div><div className="chat-msgs">{activeConvo.msgs.map((m,i)=><div key={i} className={`msg-row ${m.from}`}><div className={`msg-b ${m.from}`}>{m.text}<div className={`msg-time ${m.from}`}>{m.t}</div></div></div>)}<div ref={chatEnd}/></div><div className="chat-ib"><textarea className="chat-inp" placeholder={t.type_msg} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}} rows={1}/><button className="btn-send" onClick={sendMsg}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>{t.send_btn}</button></div></>:<Empty icon="💬" title={t.inbox_empty} sub={t.inbox_empty_sub}/>}</div></div>}</div>;

case 'contact':return <ContactPage go={go} showToast={showToast} lang={lang}/>;

  user={user}

      listing_type:modal.item?.type||'trip',
      reason:reason||'',
      details:details||''
    }).catch(()=>{});

}}/>:null}<NavBar/><div className="content">{renderPage()}</div><BotNav/></div>;}

  return(
    <div className="page">
      <div style={{background:'linear-gradient(145deg,#0A2540,#0c3060)',padding:'36px 24px 48px',position:'relative',overflow:'hidden',textAlign:'center'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:'rgba(26,188,156,.1)',borderRadius:'50%',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:-40,left:-40,width:150,height:150,background:'rgba(26,188,156,.07)',borderRadius:'50%',pointerEvents:'none'}}/>
        <button onClick={()=>go('home')} style={{background:'rgba(255,255,255,.1)',border:'none',color:'rgba(255,255,255,.7)',padding:'7px 14px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',marginBottom:20,display:'inline-flex',alignItems:'center',gap:6}}>{c.common.back}</button>
        <div style={{fontSize:52,marginBottom:12}}>📲</div>
        <h1 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:'clamp(24px,6vw,36px)',color:'#fff',marginBottom:10,letterSpacing:'-.3px'}}>{c.install.title}</h1>
        <p style={{color:'rgba(255,255,255,.65)',fontSize:15,lineHeight:1.6,maxWidth:400,margin:'0 auto 20px'}}>{c.install.sub}</p>
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>{c.install.chips.map((l,i)=><div key={l} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.1)',borderRadius:20,padding:'5px 12px',fontSize:12,color:'rgba(255,255,255,.8)',fontWeight:600}}><span>{['⚡','🔔','📱','🆓'][i]}</span><span>{l}</span></div>)}</div>
      </div>
      <div style={{maxWidth:640,margin:'0 auto',padding:'0 16px 60px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,margin:'24px 0 28px'}}>
          <button onClick={()=>{setTab('ios');document.getElementById('install-steps')?.scrollIntoView({behavior:'smooth'});}} style={{padding:'16px 12px',borderRadius:16,border:'none',background:'linear-gradient(135deg,#0A2540,#1ABC9C)',color:'#fff',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:8,boxShadow:'0 4px 20px rgba(26,188,156,.3)'}}><div style={{fontSize:34}}></div><div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14}}>{c.install.iphone}</div><div style={{fontSize:11,color:'rgba(255,255,255,.7)',textAlign:'center',lineHeight:1.4}}>{c.install.iphoneSub}</div></button>
          <button id="android-install-btn" onClick={()=>{const evt=window.__pwaInstallEvent;if(evt){evt.prompt();evt.userChoice.then(()=>{window.__pwaInstallEvent=null;});}else{setTab('android');document.getElementById('install-steps')?.scrollIntoView({behavior:'smooth'});}}} style={{padding:'16px 12px',borderRadius:16,border:'none',background:'linear-gradient(135deg,#1a7a4e,#22c55e)',color:'#fff',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:8,boxShadow:'0 4px 20px rgba(34,197,94,.3)'}}><div style={{fontSize:34}}>🤖</div><div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14}}>{c.install.android}</div><div style={{fontSize:11,color:'rgba(255,255,255,.7)',textAlign:'center',lineHeight:1.4}}>{c.install.androidSub}</div></button>
        </div>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{flex:1,height:1,background:'var(--bord)'}}/><span style={{fontSize:12,color:'var(--text3)',fontWeight:600}}>{c.install.follow}</span><div style={{flex:1,height:1,background:'var(--bord)'}}/></div></div>
        <div id="install-steps" style={{display:'flex',gap:10,marginBottom:28,background:'#f1f5f9',borderRadius:14,padding:4}}>
          <button onClick={()=>setTab('ios')} style={{flex:1,padding:'11px',borderRadius:11,border:'none',background:tab==='ios'?'#fff':'transparent',fontWeight:700,fontSize:14,color:tab==='ios'?'#0A2540':'#64748b',cursor:'pointer',boxShadow:tab==='ios'?'0 2px 8px rgba(0,0,0,.1)':'none',fontFamily:"'Sora',sans-serif"}}>{c.install.iosTab}</button>
          <button onClick={()=>setTab('android')} style={{flex:1,padding:'11px',borderRadius:11,border:'none',background:tab==='android'?'#fff':'transparent',fontWeight:700,fontSize:14,color:tab==='android'?'#0A2540':'#64748b',cursor:'pointer',boxShadow:tab==='android'?'0 2px 8px rgba(0,0,0,.1)':'none',fontFamily:"'Sora',sans-serif"}}>{c.install.androidTab}</button>
        </div>
        {steps.map((step,i)=><div key={step.num} style={{display:'flex',gap:14,marginBottom:20}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}><div style={{width:44,height:44,borderRadius:12,background:i===0?'linear-gradient(135deg,#0A2540,#1ABC9C)':'#fff',border:i===0?'none':'2px solid var(--bord)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:i===0?'0 4px 16px rgba(26,188,156,.3)':'0 2px 8px rgba(0,0,0,.05)'}}><span style={{fontSize:i===0?20:16,fontWeight:i===0?700:600,color:i===0?'#fff':'#0A2540'}}>{step.icon}</span></div>{i<steps.length-1&&<div style={{width:2,flex:1,minHeight:20,background:'linear-gradient(to bottom,#1ABC9C,#e2e8f0)',marginTop:4,borderRadius:2}}/>}</div><div style={{flex:1,background:'#fff',borderRadius:14,border:'1.5px solid var(--bord)',padding:'14px 16px',marginBottom:4,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{background:'var(--gpale)',color:'var(--green)',fontWeight:800,fontSize:11,padding:'2px 8px',borderRadius:20}}>{lang==='fr'?'Étape':lang==='en'?'Step':'Passo'} {step.num}</span></div><div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:15,color:'#0A2540',marginBottom:5}}>{step.title}</div><div style={{fontSize:14,color:'#475569',lineHeight:1.6,marginBottom:8}}>{step.desc}</div><div style={{fontSize:12,color:'#94a3b8',lineHeight:1.5,background:'#f8fafc',borderRadius:8,padding:'8px 10px',borderLeft:'3px solid var(--green)'}}>{step.detail}</div></div></div>)}
        <div style={{background:'linear-gradient(135deg,#0A2540,#0d6e5b)',borderRadius:18,padding:'24px',marginTop:8,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:10}}>🎉</div>
          <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:'#fff',marginBottom:8}}>{c.install.why}</div>
        </div>
        <div style={{marginTop:20,textAlign:'center'}}><button onClick={()=>{if(navigator.share){navigator.share({title:'AfroRoute',text:'AfroRoute',url:window.location.origin||'https://afroroute.com'}).catch(()=>{});}else if(navigator.clipboard){navigator.clipboard.writeText(window.location.origin||'https://afroroute.com').then(()=>alert(lang==='fr'?'Lien copié !':lang==='en'?'Link copied!':'Link copiado!'));}}} style={{background:'var(--green)',color:'#fff',border:'none',padding:'13px 28px',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>{c.install.share}</button></div>
      </div>
    </div>
  );
}



function ContactPage({go, showToast, lang}) {
  const c = PAGE_COPY[lang] || PAGE_COPY.pt;
  const channels = CONTACT_CHANNELS[lang] || CONTACT_CHANNELS.pt;
  const subjects = CONTACT_SUBJECTS[lang] || CONTACT_SUBJECTS.pt;
  const [form,setForm]=React.useState({name:'',email:'',subject:'',message:'',type:'general'});
  const [loading,setLoading]=React.useState(false);
  const [sent,setSent]=React.useState(false);
  const [errors,setErrors]=React.useState({});
  const s=(k,v)=>setForm(p=>({...p,[k]:v}));
  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=c.contact.errors.name;
    if(!form.email||!/\S+@\S+\.\S+/.test(form.email))e.email=c.contact.errors.email;
    if(!form.subject.trim())e.subject=c.contact.errors.subject;
    if(!form.message.trim()||form.message.length<20)e.message=c.contact.errors.message;
    setErrors(e);return Object.keys(e).length===0;
  };
  const submit=async()=>{
    if(!validate())return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false); setSent(true);
    showToast(c.contact.toast);
  };
  if(sent) return <div className="page"><div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 24px'}}><div style={{textAlign:'center',maxWidth:430}}><div style={{fontSize:64,marginBottom:20}}>✉️</div><h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:26,color:'var(--navy)',marginBottom:12}}>{c.contact.successTitle}</h2><p style={{color:'var(--text3)',fontSize:15,lineHeight:1.7,marginBottom:28}}>{c.contact.successText.replace('{email}',form.email)}</p><div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}><button onClick={()=>setSent(false)} style={{background:'none',border:'1.5px solid var(--bord)',color:'var(--text2)',padding:'11px 20px',borderRadius:10,fontWeight:600,fontSize:14,cursor:'pointer'}}>{c.contact.sendAnother}</button><button onClick={()=>go('home')} style={{background:'var(--navy)',color:'#fff',border:'none',padding:'11px 20px',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>{c.contact.backHome}</button></div></div></div></div>;
  return <div className="page"><div style={{background:'linear-gradient(145deg,var(--navy),#0c3060)',padding:'36px 24px 48px',position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:'rgba(26,188,156,.1)',borderRadius:'50%',pointerEvents:'none'}}/><button onClick={()=>go('home')} style={{background:'rgba(255,255,255,.1)',border:'none',color:'rgba(255,255,255,.7)',padding:'7px 14px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',marginBottom:20,display:'flex',alignItems:'center',gap:6}}>{c.common.homeBack}</button><div style={{fontSize:40,marginBottom:12}}>✉️</div><h1 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:'clamp(24px,5vw,36px)',color:'#fff',marginBottom:8}}>{c.contact.title}</h1><p style={{color:'rgba(255,255,255,.6)',fontSize:14,lineHeight:1.6}}>{c.contact.sub}</p></div><div style={{maxWidth:820,margin:'0 auto',padding:'0 24px 60px'}}><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:14,margin:'32px 0 36px'}}>{channels.map(ch=><div key={ch.title} style={{background:'#fff',border:'1px solid var(--bord)',borderRadius:16,padding:'20px',boxShadow:'var(--sh)',textAlign:'center'}}><div style={{fontSize:32,marginBottom:10}}>{ch.icon}</div><div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:15,color:'var(--navy)',marginBottom:4}}>{ch.title}</div><div style={{fontSize:13,color:'var(--text3)',marginBottom:14}}>{ch.desc}</div><a href={ch.link} target="_blank" rel="noopener noreferrer" style={{display:'inline-block',background:ch.color,color:'#fff',padding:'8px 18px',borderRadius:9,fontWeight:700,fontSize:13,textDecoration:'none',fontFamily:"'Sora',sans-serif"}}>{ch.btn}</a></div>)}</div><div style={{background:'#fff',border:'1px solid var(--bord)',borderRadius:18,padding:'20px',boxShadow:'var(--sh)'}}><div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:20,color:'var(--navy)',marginBottom:16}}>{c.contact.formTitle}</div><div style={{display:'grid',gap:14}}><div><label className="fl">{c.contact.typeLabel}</label><select className="fsel" value={form.type} onChange={e=>s('type',e.target.value)}>{subjects.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div><div><label className="fl">{c.contact.name}</label><input className={`fin ${errors.name?'err':''}`} value={form.name} onChange={e=>s('name',e.target.value)}/>{errors.name&&<div className="ferr">⚠ {errors.name}</div>}</div><div><label className="fl">{c.contact.email}</label><input className={`fin ${errors.email?'err':''}`} value={form.email} onChange={e=>s('email',e.target.value)}/>{errors.email&&<div className="ferr">⚠ {errors.email}</div>}</div><div><label className="fl">{c.contact.subject}</label><input className={`fin ${errors.subject?'err':''}`} value={form.subject} onChange={e=>s('subject',e.target.value)}/>{errors.subject&&<div className="ferr">⚠ {errors.subject}</div>}</div><div><label className="fl">{c.contact.message}</label><textarea className={`fta ${errors.message?'err':''}`} rows={6} value={form.message} onChange={e=>s('message',e.target.value)}/>{errors.message&&<div className="ferr">⚠ {errors.message}</div>}</div><div style={{fontSize:13,color:'var(--text3)',lineHeight:1.6}}>{c.contact.privacy}</div><button onClick={submit} disabled={loading} style={{background:'var(--green)',color:'#fff',border:'none',padding:'13px 20px',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>{loading?(lang==='fr'?'Envoi...':lang==='en'?'Sending...':'A enviar...'):c.contact.submit}</button></div></div></div></div>;
}


ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
